<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>展開図（スキャンダイアグラム）ステッパー — シングルスライス vs ヘリカル</title>
<style>
 html,body{margin:0;padding:0;background:#eef2ee;
   font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .wrap{max-width:1180px;margin:0 auto;padding:14px 16px 24px;}
 .hint{font-size:13.5px;color:#3b4a40;text-align:center;margin:4px 0 10px;}
 .hint b{color:#1b6b34;}
 .stage{background:#f5f8f5;border:1px solid #d6e0d6;border-radius:14px;
   box-shadow:0 6px 22px rgba(30,60,40,.10);overflow:hidden;}
 .stage svg{width:100%;height:auto;display:block;}
</style>
</head>
<body>
<div class="wrap">
 <div class="hint"><b>進む</b>で 90° ずつスキャンを進めます（<b>←→ / Space / Enter</b>キー、上部ボタンで直接ジャンプ、<b>r</b>でリセット）。左の装置の動きと、右の展開図が連動します。</div>
 <div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" id="ctroot" viewBox="0 0 1280 720" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="sans-serif">
<style>
 text{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .btn{cursor:pointer;}
 .btn:hover{opacity:.85;}
 #ctroot{-webkit-user-select:none;user-select:none;}
</style>
<defs>
 <marker id="ahA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#343a40"/></marker>
 <marker id="ahT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5c6b62"/></marker>
 <marker id="ahR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1b6b34"/></marker>
 <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#d6dbe1"/><stop offset="1" stop-color="#69727e"/>
 </linearGradient>
</defs>
<script type="text/javascript"><![CDATA[
(function(){
 var NS="http://www.w3.org/2000/svg";
 var svg=document.getElementById('ctroot');
 function mk(t,a,p){var e=document.createElementNS(NS,t);if(a)for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
 function tx(a,s,p){var e=mk('text',a,p);e.textContent=s;return e;}
 function clr(g){while(g.firstChild)g.removeChild(g.firstChild);}
 function range(a,b){var r=[];for(var i=a;i<b;i++)r.push(i);return r;}

 var DEG=Math.PI/180;
 var GREEN='#2f9e44',GD='#1b6b34',GL='#a9e8b5',YEL='#ffd000',AMB='#f08c00',RED='#e03131',
     INK='#1d2b22',MUT='#5c6b62',DGRY='#343a40',LGRY='#adb5bd';

 // ---------- background / title ----------
 mk('rect',{x:0,y:0,width:1280,height:720,fill:'#f5f8f5'},svg);
 tx({x:30,y:36,'font-size':23,'font-weight':700,fill:INK},'CT 画像再構成：展開図（スキャンダイアグラム）— シングルスライス と ヘリカル',svg);
 tx({x:30,y:60,'font-size':14,fill:MUT},'横軸＝回転角 β（管球の回転を展開）／縦軸＝z（体軸位置）。シングルは「水平線」、ヘリカルは「斜線」になる — なぜ z 補間が要るのか',svg);

 // ---------- panels ----------
 function panel(x,w,title,sub,accent){
   mk('rect',{x:x,y:84,width:w,height:482,rx:14,fill:'#ffffff',stroke:accent,'stroke-width':2.2},svg);
   mk('rect',{x:x,y:84,width:6,height:482,rx:3,fill:accent},svg);
   tx({x:x+22,y:116,'font-size':19,'font-weight':700,fill:accent},title,svg);
   tx({x:x+22,y:137,'font-size':12.5,fill:MUT},sub,svg);
   mk('line',{x1:x+20,y1:146,x2:x+w-20,y2:146,stroke:accent,'stroke-width':1,opacity:.5},svg);
 }
 panel(20,608,'1. 装置のうごき（物理ビュー）','ガントリが回転し、寝台が z 方向へ送られる',GREEN);
 panel(648,612,'2. 展開図（スキャンダイアグラム）','回転角 β（横）× z 位置（縦）の地図',AMB);

 // ---------- left-panel geometry ----------
 var PYc=362, RX=30, RY=120;
 function zX(z){return 120+(z/3)*420;}
 function pointAt(z,phd){var ph=phd*DEG;return [zX(z)+RX*Math.sin(ph), PYc-RY*Math.cos(ph)];}

 var gPhysBack=mk('g',{},svg), gPhysBody=mk('g',{},svg), gPhysFront=mk('g',{},svg),
     gPhysGantry=mk('g',{},svg), gPhysLbl=mk('g',{},svg);

 function emitSeg(z0,ph0,z1,ph1){
   var A=pointAt(z0,ph0), B=pointAt(z1,ph1);
   var front=Math.sin(((ph0+ph1)/2)*DEG)>=0;
   mk('line',{x1:A[0].toFixed(1),y1:A[1].toFixed(1),x2:B[0].toFixed(1),y2:B[1].toFixed(1),
     stroke:GREEN,'stroke-width':front?3.2:2.4,'stroke-opacity':front?0.95:0.30,'stroke-linecap':'round'},
     front?gPhysFront:gPhysBack);
 }

 function drawPhys(p){
   clr(gPhysBack);clr(gPhysBody);clr(gPhysFront);clr(gPhysGantry);clr(gPhysLbl);
   // bore axis + couch + body
   mk('line',{x1:78,y1:PYc,x2:596,y2:PYc,stroke:'#c5ccd4','stroke-width':1.5,'stroke-dasharray':'6 6'},gPhysBody);
   mk('rect',{x:88,y:PYc+34,width:504,height:18,rx:9,fill:'#2b3340'},gPhysBody);
   mk('rect',{x:100,y:PYc+28,width:480,height:10,rx:5,fill:'#495a73'},gPhysBody);
   mk('rect',{x:104,y:PYc-20,width:446,height:40,rx:20,fill:'#dbe5f3',stroke:'#9bb0d0','stroke-width':1.5},gPhysBody);
   tx({x:120,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad'},'頭側',gPhysBody);
   tx({x:556,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad','text-anchor':'end'},'足側',gPhysBody);

   // acquired trace
   if(p.ph==='h'){
     for(var t=0;t<p.helixBeta;t+=6) emitSeg(t/360,t,(t+6)/360,t+6);
   } else {
     p.comp.forEach(function(cs){ for(var f=0;f<360;f+=6) emitSeg(cs+0.5,f,cs+0.5,f+6); });
     if(p.partial){ for(var f2=0;f2<p.partial.theta;f2+=6) emitSeg(p.partial.slice+0.5,f2,p.partial.slice+0.5,f2+6); }
   }

   // gantry ring at current z
   var gx=zX(p.zg);
   mk('ellipse',{cx:gx,cy:PYc,rx:48,ry:150,fill:'none',stroke:'url(#ringGrad)','stroke-width':16,opacity:0.55},gPhysGantry);
   mk('ellipse',{cx:gx,cy:PYc,rx:30,ry:120,fill:'none',stroke:'url(#ringGrad)','stroke-width':2.5,opacity:0.85},gPhysGantry);

   // beam + detector + tube
   var T=pointAt(p.zg,p.theta), D=pointAt(p.zg,p.theta+180);
   if(p.beam){
     var Dm=pointAt(p.zg,p.theta+158), Dp=pointAt(p.zg,p.theta+202);
     mk('polygon',{points:T[0].toFixed(1)+','+T[1].toFixed(1)+' '+Dm[0].toFixed(1)+','+Dm[1].toFixed(1)+' '+Dp[0].toFixed(1)+','+Dp[1].toFixed(1),fill:'#f5c400',opacity:0.20},gPhysGantry);
     for(var k=-22;k<=22;k+=11){var E=pointAt(p.zg,p.theta+180+k);
       mk('line',{x1:T[0].toFixed(1),y1:T[1].toFixed(1),x2:E[0].toFixed(1),y2:E[1].toFixed(1),stroke:'#f0b000','stroke-width':1.2,opacity:0.6},gPhysGantry);}
     mk('line',{x1:T[0].toFixed(1),y1:T[1].toFixed(1),x2:D[0].toFixed(1),y2:D[1].toFixed(1),stroke:'#e8a000','stroke-width':2,opacity:0.85},gPhysGantry);
   }
   var dang=Math.atan2(PYc-D[1],gx-D[0])*180/Math.PI;
   var dg=mk('g',{transform:'translate('+D[0].toFixed(1)+' '+D[1].toFixed(1)+') rotate('+dang.toFixed(1)+')'},gPhysGantry);
   mk('rect',{x:-6,y:-26,width:12,height:52,rx:5,fill:'#13888f',stroke:'#0c5350','stroke-width':1.5},dg);
   var tang=Math.atan2(PYc-T[1],gx-T[0])*180/Math.PI;
   var tg=mk('g',{transform:'translate('+T[0].toFixed(1)+' '+T[1].toFixed(1)+') rotate('+tang.toFixed(1)+')'},gPhysGantry);
   mk('rect',{x:-10,y:-13,width:26,height:26,rx:6,fill:'#e8801a',stroke:'#8a4500','stroke-width':1.6},tg);
   mk('circle',{cx:12,cy:0,r:3.5,fill:'#fff'},tg);

   // labels: rotation + z axis
   mk('path',{d:'M '+(gx-24)+' 206 A 24 24 0 0 1 '+(gx+24)+' 206',fill:'none',stroke:GD,'stroke-width':3,'marker-end':'url(#ahR)'},gPhysLbl);
   tx({x:gx,y:196,'font-size':12,'font-weight':700,fill:GD,'text-anchor':'middle'},'管球が回転',gPhysLbl);
   var zaxY=PYc+150;
   mk('line',{x1:zX(0),y1:zaxY,x2:zX(3)+22,y2:zaxY,stroke:MUT,'stroke-width':1.4,'marker-end':'url(#ahT)'},gPhysLbl);
   [0,1,2,3].forEach(function(z){mk('line',{x1:zX(z),y1:zaxY-4,x2:zX(z),y2:zaxY+4,stroke:MUT,'stroke-width':1.2},gPhysLbl);
     tx({x:zX(z),y:zaxY+18,'font-size':12,fill:MUT,'text-anchor':'middle'},z,gPhysLbl);});
   tx({x:zX(3)+30,y:zaxY+4,'font-size':12.5,fill:MUT},'z',gPhysLbl);
   tx({x:zX(1.5),y:zaxY+40,'font-size':12.5,'font-weight':700,fill:MUT,'text-anchor':'middle'},'寝台を z 方向へ送る',gPhysLbl);
   if(p.color==='yellow') tx({x:gx,y:PYc+96,'font-size':12.5,'font-weight':700,fill:AMB,'text-anchor':'middle'},'移動中（撮像なし）',gPhysLbl);
 }

 // ---------- right-panel geometry ----------
 var bx0=722,bx1=1206,by0=498,by1=212;
 function Xb(b){return bx0+(b/1080)*(bx1-bx0);}
 function Yb(z){return by0-(z/3)*(by0-by1);}
 var gDiagGrid=mk('g',{},svg), gDiagData=mk('g',{},svg), gDiagLbl=mk('g',{},svg);

 function legend(){
   var items=[[GREEN,'撮像データ','none'],[AMB,'寝台移動（撮像なし）','5 4'],[RED,'再構成面 z_R','7 4']];
   var lx=[726,876,1066];
   items.forEach(function(it,i){
     mk('line',{x1:lx[i],y1:178,x2:lx[i]+26,y2:178,stroke:it[0],'stroke-width':3.4,'stroke-dasharray':it[2],'stroke-linecap':'round'},gDiagLbl);
     tx({x:lx[i]+32,y:182,'font-size':12,fill:INK},it[1],gDiagLbl);
   });
 }

 function drawDiag(p){
   clr(gDiagGrid);clr(gDiagData);clr(gDiagLbl);
   [360,720,1080].forEach(function(b){mk('line',{x1:Xb(b),y1:by1,x2:Xb(b),y2:by0,stroke:'#e3e8e3','stroke-width':1},gDiagGrid);});
   mk('line',{x1:bx0,y1:by0,x2:bx0,y2:by1-10,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   mk('line',{x1:bx0,y1:by0,x2:bx1+14,y2:by0,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   [0,1,2,3].forEach(function(z){mk('line',{x1:bx0-6,y1:Yb(z),x2:bx0,y2:Yb(z),stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:bx0-12,y:Yb(z)+4,'font-size':12,fill:MUT,'text-anchor':'end'},z,gDiagLbl);});
   [[360,'360°'],[720,'720°'],[1080,'1080°']].forEach(function(d){mk('line',{x1:Xb(d[0]),y1:by0,x2:Xb(d[0]),y2:by0+6,stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:Xb(d[0]),y:by0+22,'font-size':12,fill:MUT,'text-anchor':'middle'},d[1],gDiagLbl);});
   tx({x:(bx0+bx1)/2,y:by0+44,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle'},'回転角 β（展開）→',gDiagLbl);
   tx({x:bx0-32,y:(by0+by1)/2,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle','transform':'rotate(-90 '+(bx0-32)+' '+((by0+by1)/2)+')'},'z（体軸位置）',gDiagLbl);
   legend();

   if(p.curBeta>0) mk('line',{x1:Xb(p.curBeta),y1:by0,x2:Xb(p.curBeta),y2:by1,stroke:'#cbd5df','stroke-width':1,'stroke-dasharray':'4 5'},gDiagGrid);

   if(p.ph==='s'){
     p.comp.forEach(function(cs){ mk('line',{x1:Xb(cs*360),y1:Yb(cs+0.5),x2:Xb((cs+1)*360),y2:Yb(cs+0.5),stroke:GREEN,'stroke-width':4,'stroke-linecap':'round'},gDiagData); });
     for(var i=0;i<p.riserCount;i++){ mk('line',{x1:Xb((i+1)*360),y1:Yb(i+0.5),x2:Xb((i+1)*360),y2:Yb(i+1.5),stroke:'#9aa7b0','stroke-width':1.6,'stroke-dasharray':'4 4'},gDiagData); }
     if(p.activeRiser!=null){ mk('line',{x1:Xb((p.activeRiser+1)*360),y1:Yb(p.activeRiser+0.5),x2:Xb((p.activeRiser+1)*360),y2:Yb(p.activeRiser+1.5),stroke:AMB,'stroke-width':3.4,'stroke-dasharray':'5 4'},gDiagData);
       tx({x:Xb((p.activeRiser+1)*360)+8,y:Yb(p.activeRiser+1)+4,'font-size':12,'font-weight':700,fill:AMB},'寝台移動',gDiagData); }
     if(p.partial){ mk('line',{x1:Xb(p.partial.slice*360),y1:Yb(p.partial.slice+0.5),x2:Xb(p.partial.slice*360+p.partial.theta),y2:Yb(p.partial.slice+0.5),stroke:GREEN,'stroke-width':4,'stroke-linecap':'round'},gDiagData);
       mk('circle',{cx:Xb(p.partial.slice*360+p.partial.theta),cy:Yb(p.partial.slice+0.5),r:5,fill:GREEN,stroke:'#fff','stroke-width':1.5},gDiagData); }
     if(p.zRsingle){
       mk('line',{x1:bx0,y1:Yb(1.5),x2:bx1,y2:Yb(1.5),stroke:RED,'stroke-width':2,'stroke-dasharray':'7 4'},gDiagData);
       tx({x:bx1-4,y:Yb(1.5)-8,'font-size':12.5,'font-weight':700,fill:RED,'text-anchor':'end'},'z_R（完全な面に一致）',gDiagData);
     }
     if(p.summary) tx({x:(bx0+bx1)/2,y:by1+2,'font-size':13.5,'font-weight':700,fill:GD,'text-anchor':'middle'},'水平線が各 z に独立 → 完全な面が 3 つ（補間不要）',gDiagLbl);
   } else {
     if(p.helixBeta>0) mk('line',{x1:Xb(0),y1:Yb(0),x2:Xb(p.helixBeta),y2:Yb(p.helixBeta/360),stroke:GREEN,'stroke-width':4,'stroke-linecap':'round'},gDiagData);
     if(p.helixBeta>0 || p.kind==='acq') mk('circle',{cx:Xb(p.helixBeta),cy:Yb(p.helixBeta/360),r:5,fill:GREEN,stroke:'#fff','stroke-width':1.5},gDiagData);
     if(p.showZR){
       mk('line',{x1:bx0,y1:Yb(1.5),x2:bx1,y2:Yb(1.5),stroke:RED,'stroke-width':2,'stroke-dasharray':'7 4'},gDiagData);
       tx({x:bx1-4,y:Yb(1.5)-8,'font-size':13,'font-weight':700,fill:RED,'text-anchor':'end'},'再構成面 z_R',gDiagData);
       mk('circle',{cx:Xb(540),cy:Yb(1.5),r:6,fill:RED,stroke:'#fff','stroke-width':1.6},gDiagData);
       if(p.kind==='zr') tx({x:Xb(540)+10,y:Yb(1.5)+24,'font-size':12.5,'font-weight':700,fill:RED},'この面に在るのは 1 方向のみ（要 360°）',gDiagData);
     }
     if(p.kind==='sum'){
       mk('line',{x1:Xb(360),y1:Yb(1.0),x2:Xb(720),y2:Yb(2.0),stroke:GD,'stroke-width':7,'stroke-linecap':'round',opacity:0.22},gDiagData);
       mk('circle',{cx:Xb(360),cy:Yb(1.0),r:4,fill:GD},gDiagData);
       mk('circle',{cx:Xb(720),cy:Yb(2.0),r:4,fill:GD},gDiagData);
       [420,480,600,660].forEach(function(b){ mk('line',{x1:Xb(b),y1:Yb(b/360),x2:Xb(b),y2:Yb(1.5),stroke:AMB,'stroke-width':1.4,'stroke-dasharray':'3 3'},gDiagData); });
       tx({x:Xb(540),y:Yb(2.0)-12,'font-size':12.5,'font-weight':700,fill:GD,'text-anchor':'middle'},'1 枚分＝360°（z が斜めに散る）',gDiagData);
       tx({x:Xb(700),y:Yb(1.26),'font-size':11.5,'font-weight':700,fill:AMB},'縦ずれを補間',gDiagData);
     }
     if(p.summary) tx({x:(bx0+bx1)/2,y:by1+2,'font-size':13.5,'font-weight':700,fill:RED,'text-anchor':'middle'},'どの面も“完全”には揃わず 360° が z に散る → z 補間が必要',gDiagLbl);
   }
 }

 // ---------- state model ----------
 var STATES=[];
 STATES.push({ph:'s',k:'intro'});
 for(var s=0;s<3;s++){
   for(var q=0;q<=4;q++) STATES.push({ph:'s',k:'acq',slice:s,theta:q*90});
   if(s<2) STATES.push({ph:'s',k:'move',slice:s});
 }
 STATES.push({ph:'s',k:'sum'});
 STATES.push({ph:'h',k:'intro'});
 for(var t2=0;t2<=12;t2++) STATES.push({ph:'h',k:'acq',beta:t2*90});
 STATES.push({ph:'h',k:'zr'});
 STATES.push({ph:'h',k:'sum'});

 function params(idx){
   var st=STATES[idx];
   var p={ph:st.ph,kind:st.k,zg:0,theta:0,beam:false,color:'green',comp:[],partial:null,
           riserCount:0,activeRiser:null,helixBeta:0,showZR:false,zRsingle:false,summary:false,curBeta:0,msg:''};
   if(st.ph==='s'){
     if(st.k==='intro'){ p.zg=0.5; p.curBeta=0;
       p.msg='シングルスライス（ステップ＆シュート）：寝台を止めて 1 回転＝1 スライス。1 クリックで管球が 90° 回ります。'; }
     else if(st.k==='acq'){ p.zg=st.slice+0.5; p.theta=st.theta; p.beam=true; p.comp=range(0,st.slice);
       p.partial={slice:st.slice,theta:st.theta}; p.riserCount=st.slice; p.curBeta=st.slice*360+st.theta;
       p.msg=(st.theta===0)
         ? 'スライス '+(st.slice+1)+'：0°（管球は真上）から照射開始 → 真上から真下へ X 線。展開図では水平線の左端。'
         : (st.theta===360)
         ? 'スライス '+(st.slice+1)+'：1 回転（360°）完了 → この面に面内 360° のデータが揃いました。'
         : 'スライス '+(st.slice+1)+'：β = '+st.theta+'° まで回転。展開図では z 一定の「水平線」が伸びます。'; }
     else if(st.k==='move'){ p.zg=st.slice+1.0; p.color='yellow'; p.comp=range(0,st.slice+1);
       p.riserCount=st.slice; p.activeRiser=st.slice; p.curBeta=(st.slice+1)*360;
       p.msg='寝台を次の位置へ移動（この間は撮像なし）→ z が一段上がってから次のスライスを撮ります。'; }
     else { p.zg=2.5; p.comp=range(0,3); p.riserCount=2; p.summary=true; p.zRsingle=true; p.curBeta=1080;
       p.msg='各 z に完全な水平線（面内 360°）。再構成面 z_R はその 1 本にちょうど一致 → そのまま再構成でき、z 補間は不要です。'; }
   } else {
     if(st.k==='intro'){ p.zg=0; p.curBeta=0;
       p.msg='ヘリカル：回転を止めず、寝台を連続送り。1 クリックで「回転 90°＋寝台も同時に前進」します。'; }
     else if(st.k==='acq'){ p.zg=st.beta/360; p.theta=st.beta%360; p.beam=true; p.helixBeta=st.beta; p.curBeta=st.beta;
       p.msg=(st.beta===0)
         ? '0°（管球は真上）から照射開始。回転と寝台送りが同時にスタート → 焦点は螺旋を描き始める。'
         : 'β = '+st.beta+'°（'+(st.beta/360).toFixed(2)+' 回転）：回転と送りが同時 → 焦点は螺旋。展開図では 1 本の「斜線」になります。'; }
     else if(st.k==='zr'){ p.zg=3; p.helixBeta=1080; p.showZR=true; p.color='red'; p.curBeta=1080;
       p.msg='再構成面 z_R（赤破線）。斜線と交わるのは 1 点＝この面に「在る」のは 1 方向ぶんだけ（必要なのは 360°）。'; }
     else { p.zg=3; p.helixBeta=1080; p.showZR=true; p.color='red'; p.summary=true; p.curBeta=1080;
       p.msg='ヘリカルも 1 枚分の 360° は撮れている。ただし z が一定でなく「斜め」→ 各角度を z_R へ補間（次回 360°LI / 180°LI）。'; }
   }
   return p;
 }

 // ---------- control strip ----------
 mk('line',{x1:20,y1:582,x2:1260,y2:582,stroke:'#dde3dd','stroke-width':1},svg);
 var readout=tx({x:640,y:606,'font-size':15,'font-weight':700,fill:GD,'text-anchor':'middle'},'',svg);

 var NS_=STATES.length-1;
 var jumps=[['シングル',1],['シングル総括',18],['ヘリカル',19],['交点 z_R',33],['総括',NS_]];
 var jbtn=[];
 jumps.forEach(function(j,i){var bx=232+i*128;
   var g=mk('g',{'class':'btn'},svg);
   var r=mk('rect',{x:bx,y:620,width:118,height:30,rx:8,fill:'#fff',stroke:GL,'stroke-width':1.5},g);
   var t=tx({x:bx+59,y:640,'font-size':13,'font-weight':700,fill:GREEN,'text-anchor':'middle'},j[0],g);
   (function(v){g.addEventListener('click',function(){setState(v);});})(j[1]);
   jbtn.push({r:r,t:t,v:j[1]});
 });

 function ctlBtn(x,w,label,fill,stroke,fg){
   var g=mk('g',{'class':'btn'},svg);
   mk('rect',{x:x,y:662,width:w,height:42,rx:10,fill:fill,stroke:stroke,'stroke-width':2},g);
   tx({x:x+w/2,y:689,'font-size':16,'font-weight':700,fill:fg,'text-anchor':'middle'},label,g);
   return g;
 }
 var bPrev=ctlBtn(402,150,'◀ 戻る','#ffffff',GREEN,GREEN);
 var bNext=ctlBtn(566,150,'進む ▶',GREEN,GD,'#ffffff');
 var bReset=ctlBtn(730,120,'リセット','#ffffff',RED,RED);
 bPrev.addEventListener('click',function(){setState(state-1);});
 bNext.addEventListener('click',function(){setState(state+1);});
 bReset.addEventListener('click',function(){setState(0);});
 var stepTxt=tx({x:1180,y:643,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'end'},'',svg);
 tx({x:640,y:715,'font-size':12.5,fill:MUT,'text-anchor':'middle'},'クリック ／ ←→・Space・Enter で前後 ／ 上のボタンで直接ジャンプ ／ r でリセット',svg);

 // ---------- driver ----------
 var state=0;
 function update(){
   var p=params(state);
   drawPhys(p); drawDiag(p);
   readout.textContent=p.msg;
   readout.setAttribute('fill', p.color==='yellow'?AMB:(p.color==='red'?RED:GD));
   stepTxt.textContent=(state+1)+' / '+(NS_+1);
   for(var i=0;i<jbtn.length;i++){var b=jbtn[i];
     if(b.v===state){b.r.setAttribute('fill',YEL);b.r.setAttribute('stroke',AMB);b.t.setAttribute('fill',INK);}
     else{b.r.setAttribute('fill','#fff');b.r.setAttribute('stroke',GL);b.t.setAttribute('fill',GREEN);}
   }
 }
 function setState(s){state=Math.max(0,Math.min(NS_,s));update();}
 window.addEventListener('keydown',function(e){
   var k=e.key;
   if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='Enter'){e.preventDefault();setState(state+1);}
   else if(k==='ArrowLeft'||k==='ArrowUp'){e.preventDefault();setState(state-1);}
   else if(k==='r'||k==='R'){e.preventDefault();setState(0);}
 });
 setState(0);
})();
]]></script>
</svg>
 </div>
</div>
