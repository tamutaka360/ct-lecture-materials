<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>4列マルチスライスCT（MDCT）の展開図ステッパー — 4本の斜線ができるまで</title>
<style>
 html,body{margin:0;padding:0;background:#eef2ee;
   font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .wrap{max-width:1180px;margin:0 auto;padding:14px 16px 24px;}
 .hint{font-size:13.5px;color:#3b4a40;text-align:center;margin:4px 0 10px;}
 .hint b{color:#1b6b34;}
 .stage{background:#f5f8f5;border:1px solid #d6e0d6;border-radius:14px;
   box-shadow:0 6px 22px rgba(30,60,40,.10);overflow:hidden;}
 .stage svg{width:100%;height:auto;display:block;}
</style>
</head>
<body>
<div class="wrap">
 <div class="hint"><b>進む</b>で 90° ずつスキャンが進みます（<b>←→ / Space / Enter</b>キー、上部ボタンで直接ジャンプ、<b>r</b>でリセット）。左の装置の動きと、右の展開図が連動します。</div>
 <div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" id="ctroot" viewBox="0 0 1280 720" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="sans-serif">
<style>
 text{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .btn{cursor:pointer;}
 .btn:hover{opacity:.85;}
 #ctroot{-webkit-user-select:none;user-select:none;}
</style>
<defs>
 <marker id="ahA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#343a40"/></marker>
 <marker id="ahT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5c6b62"/></marker>
 <marker id="ahR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1b6b34"/></marker>
 <marker id="ahB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#1250a0"/></marker>
 <marker id="ahBs" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M10,0 L0,5 L10,10 Z" fill="#1250a0"/></marker>
 <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#d6dbe1"/><stop offset="1" stop-color="#69727e"/>
 </linearGradient>
</defs>
<script type="text/javascript"><![CDATA[
(function(){
 var NS="http://www.w3.org/2000/svg";
 var svg=document.getElementById('ctroot');
 function mk(t,a,p){var e=document.createElementNS(NS,t);if(a)for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
 function tx(a,s,p){var e=mk('text',a,p);e.textContent=s;return e;}
 function clr(g){while(g.firstChild)g.removeChild(g.firstChild);}

 var DEG=Math.PI/180;
 var GREEN='#2f9e44',GD='#1b6b34',GL='#a9e8b5',YEL='#ffd000',AMB='#f08c00',RED='#e03131',
     INK='#1d2b22',MUT='#5c6b62',DGRY='#343a40';
 // 列の色（列1=黄・列2=赤・列3=青・列4=緑）。z補間シリーズでの混合色:
 //   列1+列2=橙#e46a3c ／ 列2+列3=紫#7958a1 ／ 列3+列4=青緑#258e8d ／ 列4+列1=黄緑#90a028
 var ROWC=['#f2a20d','#d6336c','#1c7ed6','#2f9e44'],BLU='#1250a0',SGL='#8a949e',PURP='#8338ec';
 var FEED=4, NROT=3, ZMAX=16, ROW0=0.5, BMAX=360*NROT;
 // per-row colored arrowheads (+ purple #ahRow4 for 対向データ)
 var defsEl=svg.querySelector('defs');
 ROWC.concat([PURP]).forEach(function(c,i){
   var m=mk('marker',{id:'ahRow'+i,viewBox:'0 0 10 10',refX:8,refY:5,markerWidth:6,markerHeight:6,orient:'auto'},defsEl);
   mk('path',{d:'M0,0 L10,5 L0,10 Z',fill:c},m);
 });
 function rowZ(k,b,feed){return k+ROW0+(feed||FEED)*b/360;}

 // ---------- background / title ----------
 mk('rect',{x:0,y:0,width:1280,height:720,fill:'#f5f8f5'},svg);
 tx({x:30,y:36,'font-size':23,'font-weight':700,fill:INK},'CT 画像再構成：4列マルチスライスCT（MDCT）の展開図 — 4本の斜線ができるまで',svg);
 tx({x:30,y:60,'font-size':14,fill:MUT},'検出器4列（列間隔 d）が同時にらせんを描く → 展開図には「間隔 d の平行な斜線」が4本。後半で教科書の展開図（図3・17）へ橋渡し',svg);

 // ---------- panels ----------
 function panel(x,w,title,sub,accent){
   mk('rect',{x:x,y:84,width:w,height:482,rx:14,fill:'#ffffff',stroke:accent,'stroke-width':2.2},svg);
   mk('rect',{x:x,y:84,width:6,height:482,rx:3,fill:accent},svg);
   tx({x:x+22,y:116,'font-size':19,'font-weight':700,fill:accent},title,svg);
   tx({x:x+22,y:137,'font-size':12.5,fill:MUT},sub,svg);
   mk('line',{x1:x+20,y1:146,x2:x+w-20,y2:146,stroke:accent,'stroke-width':1,opacity:.5},svg);
 }
 panel(20,608,'1. 装置のうごき（物理ビュー）','1つの管球 ＋ 4列の検出器 → 4本のらせんが同時に描かれる',GREEN);
 panel(648,612,'2. 展開図（スキャンダイアグラム）','回転角 β（横）× z 位置（縦）— 列ごとに1本、計4本の軌跡',AMB);

 // ---------- left-panel geometry ----------
 var PYc=362, RX=30, RY=120;
 function zX(z){return 120+(z/ZMAX)*420;}
 function pointAt(z,phd){var ph=phd*DEG;return [zX(z)+RX*Math.sin(ph), PYc-RY*Math.cos(ph)];}

 var gPhysBack=mk('g',{},svg), gPhysBody=mk('g',{},svg), gPhysFront=mk('g',{},svg),
     gPhysGantry=mk('g',{},svg), gPhysLbl=mk('g',{},svg);

 function emitHelix(row,t0,t1,feed){
   var A=pointAt(rowZ(row,t0,feed),t0), B=pointAt(rowZ(row,t1,feed),t1);
   var front=Math.sin(((t0+t1)/2)*DEG)>=0;
   mk('line',{x1:A[0].toFixed(1),y1:A[1].toFixed(1),x2:B[0].toFixed(1),y2:B[1].toFixed(1),
     stroke:ROWC[row],'stroke-width':front?2.8:2.1,'stroke-opacity':front?0.9:0.28,'stroke-linecap':'round'},
     front?gPhysFront:gPhysBack);
 }

 function drawPhys(p){
   clr(gPhysBack);clr(gPhysBody);clr(gPhysFront);clr(gPhysGantry);clr(gPhysLbl);
   var physFeed=p.physFeed||FEED;
   // bore axis + couch + body
   mk('line',{x1:78,y1:PYc,x2:596,y2:PYc,stroke:'#c5ccd4','stroke-width':1.5,'stroke-dasharray':'6 6'},gPhysBody);
   mk('rect',{x:88,y:PYc+34,width:504,height:18,rx:9,fill:'#2b3340'},gPhysBody);
   mk('rect',{x:100,y:PYc+28,width:480,height:10,rx:5,fill:'#495a73'},gPhysBody);
   mk('rect',{x:104,y:PYc-20,width:456,height:40,rx:20,fill:'#dbe5f3',stroke:'#9bb0d0','stroke-width':1.5},gPhysBody);
   tx({x:120,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad'},'頭側',gPhysBody);
   tx({x:566,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad','text-anchor':'end'},'足側',gPhysBody);

   // 4 helical traces (row k: z = k + 0.5 + feed*β/360)
   if(p.beta>0){
     for(var row=0;row<4;row++)
       for(var t=0;t<p.beta;t+=6) emitHelix(row,t,Math.min(t+6,p.beta),physFeed);
   }

   // gantry ring at current center z
   var zc=2+physFeed*p.beta/360, gx=zX(zc);
   mk('ellipse',{cx:gx,cy:PYc,rx:48,ry:150,fill:'none',stroke:'url(#ringGrad)','stroke-width':16,opacity:0.55},gPhysGantry);
   mk('ellipse',{cx:gx,cy:PYc,rx:30,ry:120,fill:'none',stroke:'url(#ringGrad)','stroke-width':2.5,opacity:0.85},gPhysGantry);

   // beam: in-plane fan + one colored ray per detector row
   var T=pointAt(zc,p.beta);
   if(p.beam){
     var Dm=pointAt(zc,p.beta+158), Dp=pointAt(zc,p.beta+202);
     mk('polygon',{points:T[0].toFixed(1)+','+T[1].toFixed(1)+' '+Dm[0].toFixed(1)+','+Dm[1].toFixed(1)+' '+Dp[0].toFixed(1)+','+Dp[1].toFixed(1),fill:'#f5c400',opacity:0.18},gPhysGantry);
     for(var kr=0;kr<4;kr++){var E=pointAt(rowZ(kr,p.beta,physFeed),p.beta+180);
       mk('line',{x1:T[0].toFixed(1),y1:T[1].toFixed(1),x2:E[0].toFixed(1),y2:E[1].toFixed(1),stroke:ROWC[kr],'stroke-width':1.7,opacity:0.8},gPhysGantry);}
   }

   // 4-row detector (one small colored slab per row)
   for(var kd=0;kd<4;kd++){
     var Dk=pointAt(rowZ(kd,p.beta,physFeed),p.beta+180), axk=zX(rowZ(kd,p.beta,physFeed));
     var dang=Math.atan2(PYc-Dk[1],axk-Dk[0])*180/Math.PI;
     var dg=mk('g',{transform:'translate('+Dk[0].toFixed(1)+' '+Dk[1].toFixed(1)+') rotate('+dang.toFixed(1)+')'},gPhysGantry);
     mk('rect',{x:-5,y:-11,width:10,height:22,rx:3,fill:ROWC[kd],stroke:'#495057','stroke-width':1.2},dg);
   }

   // tube
   var tang=Math.atan2(PYc-T[1],gx-T[0])*180/Math.PI;
   var tg=mk('g',{transform:'translate('+T[0].toFixed(1)+' '+T[1].toFixed(1)+') rotate('+tang.toFixed(1)+')'},gPhysGantry);
   mk('rect',{x:-10,y:-13,width:26,height:26,rx:6,fill:'#e8801a',stroke:'#8a4500','stroke-width':1.6},tg);
   mk('circle',{cx:12,cy:0,r:3.5,fill:'#fff'},tg);

   // current measurement points (helix heads), spread along z around the tube
   if(p.beam){
     for(var kh=0;kh<4;kh++){var H=pointAt(rowZ(kh,p.beta,physFeed),p.beta);
       mk('circle',{cx:H[0].toFixed(1),cy:H[1].toFixed(1),r:4.5,fill:ROWC[kh],stroke:'#fff','stroke-width':1.5},gPhysGantry);}
   }

   // intro/state-1 callouts
   if(p.beta===0){
     tx({x:T[0]+22,y:T[1]-14,'font-size':12,'font-weight':700,fill:AMB},'管球は 1 つ',gPhysLbl);
     tx({x:gx+52,y:PYc+RY+4,'font-size':12,'font-weight':700,fill:BLU},'検出器は 4 列（間隔 d）',gPhysLbl);
   }

   // labels: rotation + z axis
   mk('path',{d:'M '+(gx-24)+' 206 A 24 24 0 0 1 '+(gx+24)+' 206',fill:'none',stroke:GD,'stroke-width':3,'marker-end':'url(#ahR)'},gPhysLbl);
   tx({x:gx,y:170,'font-size':12,'font-weight':700,fill:GD,'text-anchor':'middle'},'管球が回転',gPhysLbl);
   var zaxY=PYc+156;
   mk('line',{x1:zX(0),y1:zaxY,x2:zX(ZMAX)+22,y2:zaxY,stroke:MUT,'stroke-width':1.4,'marker-end':'url(#ahT)'},gPhysLbl);
   for(var z=0;z<=ZMAX;z+=4){mk('line',{x1:zX(z),y1:zaxY-4,x2:zX(z),y2:zaxY+4,stroke:MUT,'stroke-width':1.2},gPhysLbl);
     tx({x:zX(z),y:zaxY+18,'font-size':12,fill:MUT,'text-anchor':'middle'},z,gPhysLbl);}
   tx({x:zX(ZMAX)+30,y:zaxY+4,'font-size':12.5,fill:MUT},'z（d 単位）',gPhysLbl);
   tx({x:zX(6),y:zaxY+38,'font-size':12.5,'font-weight':700,fill:MUT,'text-anchor':'middle'},
     physFeed===3?'寝台を z 方向へ連続送り（3d／回転＝ピッチ0.75）':'寝台を z 方向へ連続送り（4d／回転＝ピッチ1）',gPhysLbl);
 }

 // ---------- right-panel geometry ----------
 var bx0=722,bx1=1206,by0=498,by1=212;
 function Xb(b){return bx0+(b/BMAX)*(bx1-bx0);}
 function Yb(z){return by0-(z/ZMAX)*(by0-by1);}
 var gDiagGrid=mk('g',{},svg), gDiagData=mk('g',{},svg), gDiagLbl=mk('g',{},svg);

 function legend(p){
   for(var i=0;i<4;i++)
     mk('line',{x1:726+i*13,y1:176,x2:736+i*13,y2:176,stroke:ROWC[i],'stroke-width':3.4,'stroke-linecap':'round'},gDiagLbl);
   tx({x:784,y:180,'font-size':11.2,fill:INK},p.tb?'列1〜4 の実データの軌跡':'列1〜4 の取得データ（間隔 d の斜線 4本）',gDiagLbl);
   if(p.tbOpp){
     mk('line',{x1:1000,y1:176,x2:1026,y2:176,stroke:DGRY,'stroke-width':2,'stroke-dasharray':'5 3','stroke-linecap':'round'},gDiagLbl);
     tx({x:1032,y:180,'font-size':11.2,fill:INK},'破線＝対向データ（色は元の列）',gDiagLbl);
   }
   if(p.showSingle){
     mk('line',{x1:1030,y1:176,x2:1056,y2:176,stroke:SGL,'stroke-width':3,'stroke-dasharray':'6 4','stroke-linecap':'round'},gDiagLbl);
     tx({x:1062,y:180,'font-size':11.2,fill:INK},'シングルスライス（1列）',gDiagLbl);
   }
 }

 function drawDiag(p){
   clr(gDiagGrid);clr(gDiagData);clr(gDiagLbl);
   if(p.tb){legend(p);drawTb(p);return;}
   // grid + axes
   [360,720,1080].forEach(function(b){mk('line',{x1:Xb(b),y1:by1,x2:Xb(b),y2:by0,stroke:'#e3e8e3','stroke-width':1},gDiagGrid);});
   mk('line',{x1:bx0,y1:by0,x2:bx0,y2:by1-10,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   mk('line',{x1:bx0,y1:by0,x2:bx1+14,y2:by0,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   for(var z=0;z<=ZMAX;z+=2){mk('line',{x1:bx0-6,y1:Yb(z),x2:bx0,y2:Yb(z),stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:bx0-12,y:Yb(z)+4,'font-size':12,fill:MUT,'text-anchor':'end'},z,gDiagLbl);}
   [[0,'0°'],[360,'360°'],[720,'720°'],[1080,'1080°']].forEach(function(dd){mk('line',{x1:Xb(dd[0]),y1:by0,x2:Xb(dd[0]),y2:by0+6,stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:Xb(dd[0]),y:by0+22,'font-size':12,fill:MUT,'text-anchor':'middle'},dd[1],gDiagLbl);});
   tx({x:(bx0+bx1)/2,y:by0+44,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle'},'回転角 β（展開）→',gDiagLbl);
   tx({x:bx0-32,y:(by0+by1)/2,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle','transform':'rotate(-90 '+(bx0-32)+' '+((by0+by1)/2)+')'},'z（体軸位置・d 単位）',gDiagLbl);
   legend(p);

   // current β vertical guide
   if(p.beam && p.beta>0)
     mk('line',{x1:Xb(p.beta),y1:by0,x2:Xb(p.beta),y2:by1,stroke:'#cbd5df','stroke-width':1,'stroke-dasharray':'4 5'},gDiagGrid);

   // 4 parallel diagonals grown up to current β
   for(var k=0;k<4;k++){
     if(p.beta>0)
       mk('line',{x1:Xb(0),y1:Yb(rowZ(k,0)),x2:Xb(p.beta),y2:Yb(rowZ(k,p.beta)),
         stroke:ROWC[k],'stroke-width':3,'stroke-linecap':'round',opacity:0.9},gDiagData);
     if(p.beam)
       mk('circle',{cx:Xb(p.beta),cy:Yb(rowZ(k,p.beta)),r:4.6,fill:ROWC[k],stroke:'#fff','stroke-width':1.5},gDiagData);
     if(p.beam || p.k==='sum')
       tx({x:Xb(p.beta)+10,y:Yb(rowZ(k,p.beta))+3.5,'font-size':10.5,'font-weight':700,fill:ROWC[k],
         stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'列'+(k+1),gDiagData);
   }

   // 列間隔 d bracket (β=0 state)
   if(p.dBracket){
     mk('line',{x1:bx0+48,y1:Yb(2.5),x2:bx0+48,y2:Yb(3.5),stroke:BLU,'stroke-width':1.6,
       'marker-start':'url(#ahBs)','marker-end':'url(#ahB)'},gDiagData);
     tx({x:bx0+56,y:(Yb(2.5)+Yb(3.5))/2+4,'font-size':11.5,'font-weight':700,fill:BLU,
       stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'列間隔 d',gDiagData);
     tx({x:bx0+56,y:Yb(1.2),'font-size':11.5,'font-weight':700,fill:DGRY,
       stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'1回の照射で 4点（同じ β・違う z）',gDiagData);
   }

   // 1回転の送り = 4d bracket (β=360 state)
   if(p.feedBracket){
     var fx=Xb(360)+44;
     mk('line',{x1:fx,y1:Yb(0.5),x2:fx,y2:Yb(4.5),stroke:BLU,'stroke-width':1.6,
       'marker-start':'url(#ahBs)','marker-end':'url(#ahB)'},gDiagData);
     mk('line',{x1:Xb(360),y1:Yb(0.5),x2:fx+4,y2:Yb(0.5),stroke:BLU,'stroke-width':1,'stroke-dasharray':'3 3',opacity:0.7},gDiagData);
     mk('line',{x1:Xb(360),y1:Yb(4.5),x2:fx+4,y2:Yb(4.5),stroke:BLU,'stroke-width':1,'stroke-dasharray':'3 3',opacity:0.7},gDiagData);
     tx({x:fx+10,y:(Yb(0.5)+Yb(4.5))/2+4,'font-size':11.5,'font-weight':700,fill:BLU,
       stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'1回転の送り＝4d（検出器の全幅）',gDiagData);
   }

   // single-slice comparison (summary)
   if(p.showSingle){
     mk('line',{x1:Xb(0),y1:Yb(0.5),x2:Xb(BMAX),y2:Yb(0.5+BMAX/360),stroke:SGL,'stroke-width':3,
       'stroke-dasharray':'7 5','stroke-linecap':'round'},gDiagData);
     tx({x:Xb(660),y:Yb(1.2)+14,'font-size':12,'font-weight':700,fill:SGL,'text-anchor':'middle',
       stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'シングルスライス（1列）なら 3回転でこれだけ（3d）',gDiagData);
     tx({x:(bx0+bx1)/2,y:by1+2,'font-size':13.5,'font-weight':700,fill:GD,'text-anchor':'middle'},
       '4列＝同じ回転数で約4倍の z 範囲（同じ範囲なら約1/4の時間）',gDiagLbl);
   }
 }

 // ---------- textbook-bridge drawing (states 15..18) ----------
 function drawTb(p){
   var heads={1:'① 1回転（360°）ごとに折り返す',
              2:'② 縦横を入れ替える ＝ 教科書の向き',
              3:'③ 対向データ（破線）を重ねる — ピッチ1では実線と重なる',
              4:'④ 教科書の図：送り3d（ピッチ0.75）— 実線と破線が交互に並ぶ'};
   tx({x:bx0+2,y:202,'font-size':13.5,'font-weight':700,fill:AMB},heads[p.tb],gDiagLbl);

   if(p.tb===1){
     // fold: horizontal = β mod 360°, vertical = z (same as before)
     var XF=function(b){return bx0+(b/360)*(bx1-bx0);};
     [90,180,270].forEach(function(b){mk('line',{x1:XF(b),y1:by1,x2:XF(b),y2:by0,stroke:'#e3e8e3','stroke-width':1},gDiagGrid);});
     mk('line',{x1:bx0,y1:by0,x2:bx0,y2:by1-10,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
     mk('line',{x1:bx0,y1:by0,x2:bx1+14,y2:by0,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
     for(var z=0;z<=ZMAX;z+=2){mk('line',{x1:bx0-6,y1:Yb(z),x2:bx0,y2:Yb(z),stroke:MUT,'stroke-width':1.2},gDiagLbl);
       tx({x:bx0-12,y:Yb(z)+4,'font-size':12,fill:MUT,'text-anchor':'end'},z,gDiagLbl);}
     [0,90,180,270,360].forEach(function(a){mk('line',{x1:XF(a),y1:by0,x2:XF(a),y2:by0+6,stroke:MUT,'stroke-width':1.2},gDiagLbl);
       tx({x:XF(a),y:by0+22,'font-size':12,fill:MUT,'text-anchor':'middle'},a+'°',gDiagLbl);});
     tx({x:(bx0+bx1)/2,y:by0+44,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle'},'投影角度（β を 360° で折り返し）→',gDiagLbl);
     tx({x:bx0-32,y:(by0+by1)/2,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle','transform':'rotate(-90 '+(bx0-32)+' '+((by0+by1)/2)+')'},'z（体軸位置・d 単位）',gDiagLbl);
     for(var n=0;n<3;n++){
       for(var k=0;k<4;k++)
         mk('line',{x1:XF(0),y1:Yb(k+0.5+4*n),x2:XF(360),y2:Yb(k+4.5+4*n),stroke:ROWC[k],'stroke-width':2.6,
           'marker-end':'url(#ahRow'+k+')',opacity:0.9},gDiagData);
       tx({x:XF(16),y:Yb(4*n+3.5)-8,'font-size':11.5,'font-weight':700,fill:DGRY,
         stroke:'#fff','stroke-width':3,'paint-order':'stroke'},(n+1)+'回転目',gDiagData);
     }
   } else {
     // transposed (textbook orientation): horizontal = z, vertical = projection angle 0°(top)→360°(bottom)
     var FE=(p.tb===4)?3:4;
     var aT=282,aB=470;
     var Xz=function(zz){return bx0+(zz/ZMAX)*(bx1-bx0);};
     var Ya=function(a){return aT+(a/360)*(aB-aT);};
     var cw=Xz(1)-Xz(0);
     mk('rect',{x:bx0,y:aT,width:bx1-bx0,height:aB-aT,fill:'none',stroke:DGRY,'stroke-width':1.4},gDiagGrid);
     [0,90,180,270,360].forEach(function(a){mk('line',{x1:bx0-6,y1:Ya(a),x2:bx0,y2:Ya(a),stroke:MUT,'stroke-width':1.2},gDiagLbl);
       tx({x:bx0-10,y:Ya(a)+4,'font-size':11.5,fill:MUT,'text-anchor':'end'},a+'°',gDiagLbl);});
     tx({x:bx0-46,y:(aT+aB)/2,'font-size':12.5,'font-weight':700,fill:MUT,'text-anchor':'middle','transform':'rotate(-90 '+(bx0-46)+' '+((aT+aB)/2)+')'},'投影角度',gDiagLbl);
     mk('line',{x1:bx1-66,y1:aT-8,x2:bx1-26,y2:aT-8,stroke:MUT,'stroke-width':1.4,'marker-end':'url(#ahT)'},gDiagLbl);
     tx({x:bx1-18,y:aT-4,'font-size':12.5,fill:MUT},'z',gDiagLbl);
     tx({x:bx0+2,y:219,'font-size':11,fill:MUT},'▼ 実データの軌跡（各回転の開始 0° での検出器4列の位置）',gDiagLbl);
     // top boxes: detector position at the start of each rotation
     for(var n2=0;n2<3;n2++){
       var sy=252-13*n2;
       for(var kc=0;kc<4;kc++)
         mk('rect',{x:Xz(FE*n2+kc),y:sy,width:cw,height:11,fill:ROWC[kc],'fill-opacity':0.3,
           stroke:ROWC[kc],'stroke-width':1},gDiagData);
       tx({x:Xz(FE*n2+4)+5,y:sy+9.5,'font-size':11,'font-weight':700,fill:DGRY,
         stroke:'#fff','stroke-width':3,'paint-order':'stroke'},(n2+1)+'回転目',gDiagData);
     }
     // solid trajectories (real data); ピッチ0.75では列4と次回転の列1が同じ軌跡 → 2色の交互破線で両方を見せる
     var seenReal={};
     for(var n3=0;n3<3;n3++)for(var k3=0;k3<4;k3++){
       var z0=k3+0.5+FE*n3;
       var at={x1:Xz(z0),y1:Ya(0),x2:Xz(z0+FE),y2:Ya(360),stroke:ROWC[k3],'stroke-width':2.4,
         'marker-end':'url(#ahRow'+k3+')',opacity:0.92};
       if(seenReal[z0]!=null){at['stroke-dasharray']='10 10';at['marker-end']='none';}
       seenReal[z0]=k3;
       mk('line',at,gDiagData);
     }
     // dashed opposed-data trajectories (shifted by half the feed), colored by the source row.
     // 対向＝同じX線路を反対側から測ったデータ → 教科書と同じく矢印は実データと逆向き（0° 側へ）
     if(p.tb>=3){
       var seenOpp={};
       for(var n4=0;n4<3;n4++)for(var k4=0;k4<4;k4++){
         var zo=k4+0.5+FE*n4+FE/2;
         // 対向は β=360n+180+φ の実測を使う → データは β≦1080° までなので最終回転の対向は φ=180° まで
         var phiMax=Math.min(360, 1080-180-360*n4);
         var zoe=zo+FE*phiMax/360, ae=phiMax;
         if(zoe>ZMAX){ae=(ZMAX-zo)/FE*360; zoe=ZMAX;}
         var ao={x1:Xz(zoe),y1:Ya(ae),x2:Xz(zo),y2:Ya(0),stroke:ROWC[k4],'stroke-width':1.9,
           'stroke-dasharray':'6 4','marker-end':'url(#ahRow'+k4+')',opacity:0.9};
         if(seenOpp[zo]!=null){ao['stroke-dashoffset']=5;ao['marker-end']='none';}
         seenOpp[zo]=k4;
         mk('line',ao,gDiagData);
       }
     }
     if(p.tb===3)
       tx({x:Xz(6),y:Ya(180)+4,'font-size':12,'font-weight':700,fill:DGRY,'text-anchor':'middle',
         stroke:'#fff','stroke-width':3,'paint-order':'stroke'},'破線（対向）が実線に重なる ＝ 新しい z を埋めない',gDiagData);
     // bottom boxes: detector position half a rotation after each rotation start = where the opposed trajectories begin
     if(p.tb>=3){
       for(var n5=0;n5<3;n5++){
         var byy=aB+10+13*n5;
         for(var k5=0;k5<4;k5++)
           mk('rect',{x:Xz(FE*n5+FE/2+k5),y:byy,width:cw,height:11,fill:ROWC[k5],'fill-opacity':0.12,
             stroke:ROWC[k5],'stroke-width':1,'stroke-dasharray':'3 2'},gDiagData);
       }
       tx({x:(bx0+bx1)/2,y:aB+66,'font-size':11,'font-weight':700,fill:DGRY,'text-anchor':'middle'},
         p.tb===3?'▲ ＋半回転（送り 2d）の検出器の位置＝対向データの軌跡 — 上の箱から列2つぶんのズレ'
                 :'▲ ＋半回転（送り 1.5d）の検出器の位置＝対向データの軌跡 — 上の箱から 1.5列ぶんのズレ',gDiagLbl);
     }
   }
 }

 // ---------- state model ----------
 var STATES=[{k:'intro'}];
 for(var t2=0;t2<=12;t2++) STATES.push({k:'acq',beta:t2*90});
 STATES.push({k:'sum'});
 STATES.push({k:'tb',n:1});
 STATES.push({k:'tb',n:2});
 STATES.push({k:'tb',n:3});
 STATES.push({k:'tb',n:4});

 function params(idx){
   var st=STATES[idx];
   var p={k:st.k,beta:0,beam:false,dBracket:false,feedBracket:false,showSingle:false,msg:['','']};
   if(st.k==='intro'){
     p.msg=['4列MDCT：検出器が体軸（z）方向に 4列 並んだCT（列間隔 d）。管球は 1 つでも、',
            '1回の照射で 4つの z 位置を同時に測定できる。1クリック＝90°回転でスキャンが進みます。'];
   } else if(st.k==='acq'){
     p.beta=st.beta; p.beam=true;
     if(st.beta===0){ p.dBracket=true;
       p.msg=['0°（管球は真上）：1回の照射で 列1〜4 が z＝0.5・1.5・2.5・3.5 を同時に測定 →',
              '展開図では β＝0 の縦線上に 4つの点が「間隔 d」で並ぶ。ここがシングルとの違いの出発点。'];
     } else if(st.beta===90){
       p.msg=['β＝90°：回転しながら寝台も送られる（①のヘリカルと同じ）ので、各点は斜めに動く。',
              'ただし今回は 1本ではなく、4つの点が同じ動きをする → 平行な斜線が 4本 同時に伸びる。'];
     } else if(st.beta<360){
       p.msg=['β＝'+st.beta+'°：4本の斜線は同じ傾き（送り 4d／回転）で平行に伸びていく。',
              'どの瞬間で止めても、4列の測定位置は常に間隔 d のまま（縦の点の並びを確認）。'];
     } else if(st.beta===360){ p.feedBracket=true;
       p.msg=['1回転完了：寝台は検出器の全幅ぶん（4d）進んだ＝ピッチ1。列1は z＝4.5 に到達 —',
              'これは列4の開始位置（z＝3.5）のちょうど d 上 → らせんが z を隙間なく埋めていく。'];
     } else if(st.beta<720){
       p.msg=['β＝'+st.beta+'°：2回転目。列1のらせんは、1回転目の列4のすぐ上（間隔 d）を通る。',
              '4本まとめて「検出器幅（4d）ずつ」z を覆っていくのが4列MDCTの強み。'];
     } else if(st.beta===720){
       p.msg=['2回転完了：ここまでで z ≒ 0.5〜11.5 をカバー。シングルスライス（1列・ピッチ1）なら',
              '2回転でわずか 2d 幅 — 4列は同じ回転数で約4倍の範囲を覆っている。'];
     } else if(st.beta<1080){
       p.msg=['β＝'+st.beta+'°：3回転目。「間隔 d の平行な斜線 4本」という',
              '4列MDCTの展開図の基本パターンが、はっきり見えてきた。'];
     } else {
       p.msg=['3回転でスキャン終了：間隔 d の平行な斜線が 4本 完成（カバー範囲 z ≒ 0.5〜15.5）。',
              'これが4列MDCTの展開図。次の「総括」でシングルスライスと比較します。'];
     }
   } else if(st.k==='sum'){
     p.beta=BMAX; p.showSingle=true;
     p.msg=['灰色の破線＝シングルスライス（1列・ピッチ1）：同じ3回転でも z は 3d 幅しか進めない。',
            '4列は約4倍の範囲を同じ時間でカバー。続けて進むと、教科書（図3・17）の展開図との対応がわかります。'];
   } else {
     p.beta=BMAX; p.tb=st.n; p.tbOpp=(st.n>=3); p.physFeed=(st.n===4)?3:FEED;
     if(st.n===1)
       p.msg=['教科書への橋渡し①：管球の角度は 1回転（360°）で元に戻るので、教科書は β を 360° ごとに折り返して描く。',
              '4本の長い斜線を 360° ごとに切る → 4本 × 3回転 ＝ 12本。右端に達した線は、左端の 4d 上から続く。'];
     else if(st.n===2)
       p.msg=['橋渡し②：教科書（図3・17）は縦横が逆 — 横軸＝z（体軸）、縦軸＝投影角度（上 0° → 下 360°）。',
              '12本の斜線が「実データの軌跡」。上の箱＝各回転の開始（0°）時に検出器4列がある z 位置。'];
     else if(st.n===3)
       p.msg=['橋渡し③：破線＝対向データ（同じX線路を β＋180° の反対側から測ったもの。だから矢印は実データと逆向き、色は元の列）。',
              'ピッチ1では＋半回転の検出器（下の箱）が上の箱から列2つぶん（2d＝d の整数倍）ズレる → 破線は実線に重なり、新しい z を埋めない。'];
     else
       p.msg=['送りを 3d（ピッチ0.75）にすると：＋半回転のズレ（下の箱）が 1.5d（d の半端）になり、対向データ（破線）が実線のちょうど中間に入る',
              '→ z の標本間隔は実質 d/2。教科書 図3・17 はこれをモノクロで描いたもの（実線＝実データ／破線＝対向データ）。'];
   }
   return p;
 }

 // ---------- control strip ----------
 mk('line',{x1:20,y1:582,x2:1260,y2:582,stroke:'#dde3dd','stroke-width':1},svg);
 var readout1=tx({x:640,y:600,'font-size':14.5,'font-weight':700,fill:GD,'text-anchor':'middle'},'',svg);
 var readout2=tx({x:640,y:618,'font-size':14.5,'font-weight':700,fill:GD,'text-anchor':'middle'},'',svg);

 var NS_=STATES.length-1;
 var jumps=[['イントロ',0],['4列同時測定',1],['1回転',5],['総括',14],['折り返し',15],['教科書の図',NS_]];
 var jbtn=[];
 jumps.forEach(function(j,i){var bx=232+i*128;
   var g=mk('g',{'class':'btn'},svg);
   var r=mk('rect',{x:bx,y:626,width:118,height:28,rx:8,fill:'#fff',stroke:GL,'stroke-width':1.5},g);
   var t=tx({x:bx+59,y:645,'font-size':13,'font-weight':700,fill:GREEN,'text-anchor':'middle'},j[0],g);
   (function(v){g.addEventListener('click',function(){setState(v);});})(j[1]);
   jbtn.push({r:r,t:t,v:j[1]});
 });

 function ctlBtn(x,w,label,fill,stroke,fg){
   var g=mk('g',{'class':'btn'},svg);
   mk('rect',{x:x,y:664,width:w,height:40,rx:10,fill:fill,stroke:stroke,'stroke-width':2},g);
   tx({x:x+w/2,y:690,'font-size':16,'font-weight':700,fill:fg,'text-anchor':'middle'},label,g);
   return g;
 }
 var bPrev=ctlBtn(402,150,'◀ 戻る','#ffffff',GREEN,GREEN);
 var bNext=ctlBtn(566,150,'進む ▶',GREEN,GD,'#ffffff');
 var bReset=ctlBtn(730,120,'リセット','#ffffff',RED,RED);
 bPrev.addEventListener('click',function(){setState(state-1);});
 bNext.addEventListener('click',function(){setState(state+1);});
 bReset.addEventListener('click',function(){setState(0);});
 var stepTxt=tx({x:1180,y:648,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'end'},'',svg);
 tx({x:640,y:716,'font-size':12.5,fill:MUT,'text-anchor':'middle'},'クリック ／ ←→・Space・Enter で前後 ／ 上のボタンで直接ジャンプ ／ r でリセット',svg);

 // ---------- driver ----------
 var state=0;
 function update(){
   var p=params(state);
   drawPhys(p); drawDiag(p);
   readout1.textContent=p.msg[0];
   readout2.textContent=p.msg[1];
   stepTxt.textContent=(state+1)+' / '+(NS_+1);
   for(var i=0;i<jbtn.length;i++){var b=jbtn[i];
     if(b.v===state){b.r.setAttribute('fill',YEL);b.r.setAttribute('stroke',AMB);b.t.setAttribute('fill',INK);}
     else{b.r.setAttribute('fill','#fff');b.r.setAttribute('stroke',GL);b.t.setAttribute('fill',GREEN);}
   }
 }
 function setState(s){state=Math.max(0,Math.min(NS_,s));update();}
 window.addEventListener('keydown',function(e){
   var k=e.key;
   if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='Enter'){e.preventDefault();setState(state+1);}
   else if(k==='ArrowLeft'||k==='ArrowUp'){e.preventDefault();setState(state-1);}
   else if(k==='r'||k==='R'){e.preventDefault();setState(0);}
 });
 setState(0);
})();
]]></script>
