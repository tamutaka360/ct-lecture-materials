<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>投影切断面定理 ステッパー（クリックで1ステップずつ）</title>
<style>
 html,body{margin:0;padding:0;background:#ece7db;
   font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',Meiryo,'Noto Sans JP',sans-serif;}
 .page{max-width:1340px;margin:0 auto;padding:16px 16px 26px;}
 .hint{font-size:13.5px;color:#3b4a48;margin:2px 0 12px;text-align:center;}
 .hint b{color:#0c5350;}
 .stage{background:#f6f2e8;border:1px solid #ddd5c5;border-radius:12px;
   box-shadow:0 6px 22px rgba(40,60,58,.10);overflow:hidden;}
 .stage svg{width:100%;height:auto;display:block;}
</style>
</head>
<body>
<div class="page">
  <div class="hint"><b>［進む &#9654;］または &#8594; キー／クリック</b>で1ステップずつ進みます。①投影プロファイルが現れ &#8594; ②1次元スペクトルと右の断面線が現れ &#8594; クリックごとに角度が回って山（2次元フーリエ空間）を埋め &#8594; 最後に &#9315; <b>2次元逆フーリエ変換</b>で横断像が再構成されます。</div>
  <div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" id="ctroot" viewBox="0 0 1480 700" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="sans-serif">
<style>
 text{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo","Noto Sans JP",sans-serif;}
 .btn{cursor:pointer;}
 .btn:hover{opacity:.85;}
 #ctroot{-webkit-user-select:none;user-select:none;}
</style>
<defs>
 <marker id="ahOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#d97a16"/></marker>
 <marker id="ahTeal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#1b8a86"/></marker>
 <marker id="ahDark" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#25303b"/></marker>
 <marker id="ahGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#8a8273"/></marker>
 <radialGradient id="reconGrad" cx="50%" cy="50%" r="50%">
   <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
   <stop offset="45%" stop-color="#ffffff" stop-opacity="0.55"/>
   <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
 </radialGradient>
 <filter id="reblur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3.4"/></filter>
 <clipPath id="reclip" clipPathUnits="userSpaceOnUse"><rect id="reclipRect" x="0" y="0" width="200" height="200"/></clipPath>
</defs>
<script type="text/javascript"><![CDATA[
(function(){
 var NS="http://www.w3.org/2000/svg";
 var svg=document.getElementById('ctroot');
 function mk(t,a,p){var e=document.createElementNS(NS,t);if(a)for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
 function tx(a,s,p){var e=mk('text',a,p);e.textContent=s;return e;}
 function clr(g){while(g.firstChild)g.removeChild(g.firstChild);}

 // ---- palette (Fourier theme, from original animation) ----
 var TEAL='#1b8a86', TD='#0c5350', TL='#bfe7e0';
 var ORG='#d97a16', OL='#f6b73c', OD='#b35f10';
 var INK='#25303b', MUT='#5b6770', GRY='#8a8273';
 var AMB='#f08c00', YEL='#ffd000', PAPER='#f6f2e8';

 var DEG=Math.PI/180, NV=20, DA=18;            // 20 angles, 18deg each = 360deg
 var NSTATE=NV+3;                               // 0 prep,1 profile,2..21 angles,22 recon  => 23 states (0..22)

 // ---- phantom blobs (object coords, y up). signed density ----
 var blobs=[
   {x:0,  y:0,   A: 1.00, s:52, draw:'body'},
   {x:-40,y:6,   A:-0.55, s:22, draw:'lung'},
   {x:40, y:6,   A:-0.55, s:22, draw:'lung'},
   {x:8,  y:2,   A: 0.55, s:16, draw:'heart'},
   {x:0,  y:-52, A: 0.65, s:9,  draw:'spine'}
 ];
 function sval(s,th){var v=0;for(var i=0;i<blobs.length;i++){var b=blobs[i];var s0=b.x*Math.cos(th)+b.y*Math.sin(th);var d=s-s0;v+=b.A*Math.exp(-d*d/(2*b.s*b.s));}return v;}

 // ---- geometry ----
 var PY=46, PH=372, PW=348;
 var PX=[22,384,746,1108];
 var P1cx=PX[0]+PW/2, P1cy=250, RAY=120, HALF=104;
 var P3cx=PX[2]+PW/2, P3cy=300, Hsc=120, Kx=110.85, Ky=64.0, RX=156.8, RY=90.5; // isometric hill basis
 var P4cx=PX[3]+PW/2, P4cy=252, IMG=100, ISC=1.18;

 // panel-2 plots
 var pX0=PX[1]+24, pX1=PX[1]+PW-20;
 function Xs(s){return pX0+(s+100)/200*(pX1-pX0);}
 var yBP=232, HpP=80, MAXP=2.3;                 // profile
 function Yp(v){v=Math.max(0,Math.min(v,MAXP));return yBP-v/MAXP*HpP;}
 var yBS=400, HpS=72;                           // spectrum

 // ---- background ----
 mk('rect',{x:0,y:0,width:1480,height:700,fill:PAPER},svg);
 tx({x:740,y:32,'font-size':24,'font-weight':700,fill:TD,'text-anchor':'middle'},'投影切断面定理 ステッパー（クリックで1ステップずつ）',svg);

 // ---- panel frames ----
 function panel(x,title,sub,accent){
   mk('rect',{x:x,y:PY,width:PW,height:PH,rx:14,fill:'#ffffff',stroke:accent,'stroke-width':2.2},svg);
   mk('rect',{x:x,y:PY,width:6,height:PH,rx:3,fill:accent},svg);
   tx({x:x+20,y:PY+30,'font-size':17,'font-weight':700,fill:accent},title,svg);
   tx({x:x+20,y:PY+50,'font-size':12,fill:MUT},sub,svg);
   mk('line',{x1:x+18,y1:PY+58,x2:x+PW-18,y2:PY+58,stroke:accent,'stroke-width':1,opacity:.45},svg);
 }
 panel(PX[0],'① 体を通る投影','平行ビームを角度 θ で回す',ORG);
 panel(PX[1],'② 投影プロファイル → 1次元FT',' pθ(s) を 1次元フーリエ変換',ORG);
 panel(PX[2],'③ 2次元フーリエ空間','断面を集めて山を埋める',TEAL);
 panel(PX[3],'④ 2次元逆フーリエ変換','＝ 横断像（白黒・ややボケ）',TD);

 var a1=tx({x:PX[0]+PW-16,y:PY+30,'font-size':15,'font-weight':700,fill:OD,'text-anchor':'end'},'θ=0°',svg);
 var a3=tx({x:PX[2]+PW-16,y:PY+30,'font-size':15,'font-weight':700,fill:TD,'text-anchor':'end'},'断面 0/'+NV,svg);

 // ---- inter-panel arrows ----
 function harrow(x1,x2,y,label,col,mk_){
   mk('line',{x1:x1,y1:y,x2:x2,y2:y,stroke:col,'stroke-width':3.2,'marker-end':'url(#'+mk_+')'},svg);
   tx({x:(x1+x2)/2,y:y-9,'font-size':12,'font-weight':700,fill:col,'text-anchor':'middle'},label,svg);
 }
 harrow(PX[0]+PW+2,PX[1]-4,250,'投影',ORG,'ahOrange');
 harrow(PX[1]+PW+2,PX[2]-4,250,'＝断面',TEAL,'ahTeal');
 var gA34=mk('g',{},svg);   // P3->P4 arrow appears at recon

 // ================= Panel 1 : phantom + rotating beam =================
 // static phantom
 (function(){
   var g=mk('g',{},svg);
   mk('ellipse',{cx:P1cx,cy:P1cy,rx:104,ry:78,fill:'#ecdfd2',stroke:'#c2a78f','stroke-width':2.5},g);
   blobs.forEach(function(b){
     var ix=P1cx+b.x, iy=P1cy-b.y;
     if(b.draw==='lung') mk('ellipse',{cx:ix,cy:iy,rx:34,ry:46,fill:'#2e3a40',stroke:'#1f292e','stroke-width':1.5},g);
   });
   mk('ellipse',{cx:P1cx+8,cy:P1cy-2,rx:20,ry:30,fill:'#b4685c',stroke:'#8e4f45','stroke-width':1.5},g);   // heart
   mk('circle',{cx:P1cx,cy:P1cy+52,r:15,fill:'#f6f1e6',stroke:'#b9b0a0','stroke-width':2},g);              // spine
 })();
 var gBeam=mk('g',{},svg);
 // angle dial
 mk('circle',{cx:PX[0]+30,cy:PY+86,r:17,fill:'#ffffff',stroke:GRY,'stroke-width':1.4},svg);
 var dial=mk('g',{},svg);
 mk('line',{x1:PX[0]+30,y1:PY+86,x2:PX[0]+30,y2:PY+72,stroke:ORG,'stroke-width':3,'stroke-linecap':'round'},dial);

 function drawBeam(idx,prep){
   clr(gBeam);
   var deg=idx*DA, th=deg*DEG;
   var g=mk('g',{transform:'translate('+P1cx+' '+P1cy+') rotate('+(-deg)+')'},gBeam);
   mk('rect',{x:-HALF,y:-RAY,width:2*HALF,height:2*RAY,fill:OL,opacity:.14},g);
   for(var k=0;k<9;k++){var x=-HALF+8+k*((2*HALF-16)/8);mk('line',{x1:x,y1:-RAY,x2:x,y2:RAY,stroke:'#f0a32e','stroke-width':2,opacity:.5},g);}
   mk('rect',{x:-HALF,y:-RAY-12,width:2*HALF,height:11,rx:3,fill:'#6b7280'},g);        // source
   mk('rect',{x:-HALF,y:RAY+1,width:2*HALF,height:12,rx:3,fill:TD},g);                 // detector
   for(var d=0;d<=16;d++){var xd=-HALF+d*(2*HALF/16);mk('line',{x1:xd,y1:RAY+1,x2:xd,y2:RAY+12,stroke:'#ffffff','stroke-width':1,opacity:.55},g);}
   tx({x:0,y:-RAY-18,'font-size':11.5,'font-weight':700,fill:'#52606b','text-anchor':'middle',transform:'rotate('+deg+',0,'+(-RAY-18)+')'},'X線源',g);
   tx({x:0,y:RAY+26,'font-size':11.5,'font-weight':700,fill:TD,'text-anchor':'middle',transform:'rotate('+deg+',0,'+(RAY+26)+')'},'検出器',g);
   dial.setAttribute('transform','rotate('+(-deg)+' '+(PX[0]+30)+' '+(PY+86)+')');
 }

 // ================= Panel 2 : profile + 1D FT + spectrum =================
 // profile axes (revealed at state>=1)
 var gProfAx=mk('g',{},svg);
 mk('line',{x1:pX0-6,y1:yBP,x2:pX1+8,y2:yBP,stroke:GRY,'stroke-width':1.4,'marker-end':'url(#ahGray)'},gProfAx);
 mk('line',{x1:Xs(0),y1:yBP,x2:Xs(0),y2:yBP+5,stroke:GRY,'stroke-width':1},gProfAx);
 tx({x:pX1+8,y:yBP+18,'font-size':11.5,fill:MUT,'text-anchor':'end'},'位置 s',gProfAx);
 var lblProf=tx({x:pX0,y:yBP-HpP-8,'font-size':13,'font-weight':700,fill:OD},'投影プロファイル pθ(s)',svg);
 var gProf=mk('g',{},svg);
 // 1D FT arrow + label
 var gFT=mk('g',{},svg);
 mk('line',{x1:PX[1]+60,y1:yBP+18,x2:PX[1]+60,y2:yBP+54,stroke:INK,'stroke-width':3,'marker-end':'url(#ahDark)'},gFT);
 tx({x:PX[1]+76,y:yBP+44,'font-size':13,'font-weight':700,fill:INK},'1次元フーリエ変換',gFT);
 // spectrum axes (revealed at state>=2)
 var gSpecAx=mk('g',{},svg);
 mk('line',{x1:pX0-6,y1:yBS,x2:pX1+8,y2:yBS,stroke:GRY,'stroke-width':1.4,'marker-end':'url(#ahGray)'},gSpecAx);
 mk('line',{x1:Xs(0),y1:yBS,x2:Xs(0),y2:yBS+5,stroke:GRY,'stroke-width':1},gSpecAx);
 tx({x:Xs(0),y:yBS+18,'font-size':10.5,fill:MUT,'text-anchor':'middle'},'0',gSpecAx);
 tx({x:pX1+8,y:yBS+18,'font-size':11.5,fill:MUT,'text-anchor':'end'},'空間周波数',gSpecAx);
 var lblSpec=tx({x:pX0,y:yBS-HpS-8,'font-size':13,'font-weight':700,fill:TD},'1次元スペクトル（振幅）',svg);
 var gSpec=mk('g',{},svg);
 var noteSpec=tx({x:(pX0+pX1)/2,y:yBS+34,'font-size':11.5,fill:TD,'text-anchor':'middle'},'＝ 右の山を θ で切った断面（黒い曲線）',svg);

 function drawProfile(idx,hide){
   clr(gProf);lblProf.setAttribute('opacity',hide?0:1);
   if(hide)return;
   var th=idx*DA*DEG;
   var dp='M '+Xs(-100).toFixed(1)+' '+yBP;
   for(var s=-100;s<=100;s+=2){dp+=' L '+Xs(s).toFixed(1)+' '+Yp(sval(s,th)).toFixed(1);}
   dp+=' L '+Xs(100).toFixed(1)+' '+yBP+' Z';
   mk('path',{d:dp,fill:OL,'fill-opacity':.34,stroke:ORG,'stroke-width':2.4,'stroke-linejoin':'round','stroke-linecap':'round'},gProf);
 }
 function drawSpectrum(hide){
   clr(gSpec);lblSpec.setAttribute('opacity',hide?0:1);gFT.setAttribute('opacity',hide?0:1);noteSpec.setAttribute('opacity',hide?0:1);
   if(hide)return;
   function bell(f){return Math.exp(-f*f/(2*38*38));}
   var dp='M '+Xs(-100).toFixed(1)+' '+yBS, ln='';
   for(var f=-100;f<=100;f+=2){var y=(yBS-bell(f)*HpS).toFixed(1);dp+=' L '+Xs(f).toFixed(1)+' '+y;ln+=(f===-100?'M ':' L ')+Xs(f).toFixed(1)+' '+y;}
   dp+=' L '+Xs(100).toFixed(1)+' '+yBS+' Z';
   mk('path',{d:dp,fill:TEAL,'fill-opacity':.18,stroke:'none'},gSpec);
   mk('path',{d:ln,fill:'none',stroke:INK,'stroke-width':2.8,'stroke-linejoin':'round','stroke-linecap':'round'},gSpec);
 }

 // ================= Panel 3 : 2D Fourier hill =================
 function HH(r){r=Math.abs(r);return r>=1?0:(1+Math.cos(Math.PI*r))/2;}
 function rhoOf(z){return Math.acos(2*z-1)/Math.PI;}
 function sxy(fx,fy,h){return [P3cx+Kx*(fx-fy), P3cy+Ky*(fx+fy)-h*Hsc];}
 function lp(a,b,t){return Math.round(a+(b-a)*t);}
 var Cb=[27,138,134], Ct=[201,231,224];
 function mix(t){return 'rgb('+lp(Cb[0],Ct[0],t)+','+lp(Cb[1],Ct[1],t)+','+lp(Cb[2],Ct[2],t)+')';}
 var gHill=mk('g',{},svg);
 (function(){
   mk('ellipse',{cx:P3cx,cy:P3cy+8,rx:RX*1.03,ry:RY*1.03,fill:'#3b3326',opacity:.08},gHill);
   var NL=44;
   for(var k=0;k<NL;k++){var z=k/NL,rho=rhoOf(z);mk('ellipse',{cx:P3cx,cy:P3cy-z*Hsc,rx:RX*rho,ry:RY*rho,fill:mix(z)},gHill);}
   mk('ellipse',{cx:P3cx,cy:P3cy-Hsc,rx:RX*0.025,ry:RY*0.025,fill:mix(1)},gHill);
   mk('ellipse',{cx:P3cx,cy:P3cy,rx:RX,ry:RY,fill:'none',stroke:TD,'stroke-width':1.5,opacity:.5},gHill);
   [0.3,0.58,0.82].forEach(function(z){var rho=rhoOf(z);mk('ellipse',{cx:P3cx,cy:P3cy-z*Hsc,rx:RX*rho,ry:RY*rho,fill:'none',stroke:'#eafaf7','stroke-width':1,opacity:.45},gHill);});
 })();
 // vertical magnitude axis
 mk('line',{x1:P3cx,y1:P3cy,x2:P3cx,y2:P3cy-Hsc-18,stroke:GRY,'stroke-width':1.3,'stroke-dasharray':'4 3','marker-end':'url(#ahGray)'},svg);
 tx({x:P3cx,y:P3cy-Hsc-24,'font-size':11.5,fill:MUT,'text-anchor':'middle'},'振幅',svg);
 (function(){var p=sxy(1.18,0,0);mk('line',{x1:P3cx,y1:P3cy,x2:p[0],y2:p[1],stroke:GRY,'stroke-width':1.1,'marker-end':'url(#ahGray)'},svg);tx({x:p[0]+4,y:p[1]+12,'font-size':12,'font-style':'italic',fill:MUT},'fx',svg);})();
 (function(){var p=sxy(0,1.18,0);mk('line',{x1:P3cx,y1:P3cy,x2:p[0],y2:p[1],stroke:GRY,'stroke-width':1.1,'marker-end':'url(#ahGray)'},svg);tx({x:p[0]-16,y:p[1]+12,'font-size':12,'font-style':'italic',fill:MUT},'fy',svg);})();

 var gChord=mk('g',{},svg);   // base-plane spokes (radial sampling)
 var gDrape=mk('g',{},svg);   // draped slice curves on the hill
 function drapePath(al){
   var d='';
   for(var t=-1;t<=1.0001;t+=2/60){var p=sxy(t*Math.cos(al),t*Math.sin(al),HH(t));d+=(t<=-1?'M ':' L ')+p[0].toFixed(1)+' '+p[1].toFixed(1);}
   return d;
 }
 function chordPath(al){var a=sxy(-Math.cos(al),-Math.sin(al),0),b=sxy(Math.cos(al),Math.sin(al),0);return 'M '+a[0].toFixed(1)+' '+a[1].toFixed(1)+' L '+b[0].toFixed(1)+' '+b[1].toFixed(1);}
 function drawSlices(count){
   clr(gChord);clr(gDrape);
   for(var i=0;i<count;i++){
     var al=i*DA*DEG, cur=(i===count-1);
     mk('path',{d:chordPath(al),fill:'none',stroke:ORG,'stroke-width':cur?2:1.1,opacity:cur?.85:.28,'stroke-dasharray':cur?'6 4':'0'},gChord);
     mk('path',{d:drapePath(al),fill:'none',stroke:cur?INK:ORG,'stroke-width':cur?3.4:1.6,opacity:cur?1:.5,'stroke-linejoin':'round','stroke-linecap':'round'},gDrape);
   }
 }

 // ================= Panel 4 : reconstruction =================
 mk('rect',{x:P4cx-IMG,y:P4cy-IMG,width:2*IMG,height:2*IMG,rx:4,fill:'#0a0a0a',stroke:'#000','stroke-width':1},svg);
 document.getElementById('reclipRect').setAttribute('x',P4cx-IMG);
 document.getElementById('reclipRect').setAttribute('y',P4cy-IMG);
 document.getElementById('reclipRect').setAttribute('width',2*IMG);
 document.getElementById('reclipRect').setAttribute('height',2*IMG);
 var gRecon=mk('g',{},svg);
 var recAmp={body:0.5,heart:0.85,spine:0.95};
 function drawRecon(show){
   clr(gRecon);
   var ph=tx({x:P4cx,y:P4cy,'font-size':13,fill:'#6b675e','text-anchor':'middle'},'',gRecon);
   if(!show){ph.textContent='（全断面を集めると現れます）';return;}
   var inner=mk('g',{'clip-path':'url(#reclip)',filter:'url(#reblur)','style':'isolation:isolate'},gRecon);
   blobs.forEach(function(b){
     if(!(b.draw in recAmp))return;
     var ix=P4cx+b.x*ISC, iy=P4cy-b.y*ISC, rr=b.s*ISC*2.2;
     var c=mk('circle',{cx:ix,cy:iy,r:rr,fill:'url(#reconGrad)'},inner);
     c.setAttribute('style','mix-blend-mode:screen;opacity:'+recAmp[b.draw]);
   });
   mk('rect',{x:P4cx-IMG,y:P4cy-IMG,width:2*IMG,height:2*IMG,rx:4,fill:'none',stroke:'#3a3a3a','stroke-width':1},gRecon);
 }
 var p4status=tx({x:P4cx,y:P4cy+IMG+24,'font-size':12,fill:MUT,'text-anchor':'middle'},'',svg);

 // ================= control strip =================
 mk('line',{x1:22,y1:438,x2:1458,y2:438,stroke:'#ddd5c4','stroke-width':1},svg);
 var readout=tx({x:740,y:466,'font-size':19,'font-weight':700,fill:TD,'text-anchor':'middle'},'',svg);

 // progress cells (20)
 tx({x:740,y:494,'font-size':12,'font-weight':700,fill:MUT,'text-anchor':'middle'},'取得した断面（クリックで直接ジャンプ）',svg);
 var cells=[], CW=28, CG=4, total=NV*CW+(NV-1)*CG, cs0=(1480-total)/2;
 for(var i=0;i<NV;i++){
   var bx=cs0+i*(CW+CG);
   var g=mk('g',{'class':'btn'},svg);
   var r=mk('rect',{x:bx,y:502,width:CW,height:20,rx:4,fill:'#ffffff',stroke:TL,'stroke-width':1.4},g);
   (function(idx){g.addEventListener('click',function(){setState(idx+2);});})(i);
   cells.push(r);
 }
 tx({x:cs0,y:538,'font-size':10.5,fill:MUT,'text-anchor':'start'},'0°',svg);
 tx({x:cs0+total,y:538,'font-size':10.5,fill:MUT,'text-anchor':'end'},'342°（18°刻み・全'+NV+'方向）',svg);

 function ctlBtn(x,w,label,fill,stroke,fg){
   var g=mk('g',{'class':'btn'},svg);
   mk('rect',{x:x,y:552,width:w,height:42,rx:10,fill:fill,stroke:stroke,'stroke-width':2},g);
   tx({x:x+w/2,y:579,'font-size':16,'font-weight':700,fill:fg,'text-anchor':'middle'},label,g);
   return g;
 }
 var bPrev=ctlBtn(514,150,'◀ 戻る','#ffffff',TEAL,TEAL);
 var bNext=ctlBtn(680,150,'進む ▶',TEAL,TD,'#ffffff');
 var bReset=ctlBtn(846,120,'リセット','#ffffff',ORG,OD);
 bPrev.addEventListener('click',function(){setState(state-1);});
 bNext.addEventListener('click',function(){setState(state+1);});
 bReset.addEventListener('click',function(){setState(0);});
 tx({x:740,y:626,'font-size':12.5,fill:MUT,'text-anchor':'middle'},'クリック ／ ← → キーで前後 ／ セルで直接ジャンプ ／ リセットで最初へ',svg);

 // ================= state =================
 var state=0;
 function updCells(angleIdx,count,show){
   for(var i=0;i<NV;i++){var r=cells[i];
     if(show&&i===angleIdx){r.setAttribute('fill',YEL);r.setAttribute('stroke',AMB);}
     else if(i<count){r.setAttribute('fill',TEAL);r.setAttribute('stroke',TD);}
     else{r.setAttribute('fill','#ffffff');r.setAttribute('stroke',TL);}
   }
 }
 function update(){
   var prep=state===0, recon=state===NSTATE-1;
   var showProf=state>=1, showSpec=state>=2, showSl=state>=2;
   var angleIdx=state<=1?0:Math.min(state-2,NV-1);
   var count=state>=2?angleIdx+1:0;
   var deg=angleIdx*DA;
   drawBeam(angleIdx,prep);
   gProfAx.setAttribute('opacity',showProf?1:0);
   gSpecAx.setAttribute('opacity',showSpec?1:0);
   drawProfile(angleIdx,!showProf);
   drawSpectrum(!showSpec);
   drawSlices(count);
   drawRecon(recon);
   updCells(angleIdx,count,showSl);
   // P3->P4 arrow
   clr(gA34);
   if(recon){mk('line',{x1:PX[2]+PW+2,y1:250,x2:PX[3]-4,y2:250,stroke:INK,'stroke-width':3.2,'marker-end':'url(#ahDark)'},gA34);tx({x:(PX[2]+PW+PX[3])/2,y:241,'font-size':12,'font-weight':700,fill:INK,'text-anchor':'middle'},'2次元逆FT',gA34);}
   a1.textContent='θ='+deg+'°';
   a3.textContent='断面 '+count+'/'+NV;
   if(prep) readout.textContent='準備 ─ 角度 θ=0° の投影をこれから見ます（［進む ▶］で開始）';
   else if(state===1) readout.textContent='① 角度 θ=0° の投影プロファイル pθ(s) が得られた';
   else if(recon) readout.textContent='④ 2次元逆フーリエ変換 → 横断像を再構成（'+NV+'方向すべて使用）';
   else readout.textContent='② 1次元フーリエ変換 ＝ 2次元フーリエ空間の断面　｜　θ='+deg+'°　｜　取得 '+count+'/'+NV;
   p4status.textContent=recon?'白黒・ややボケた横断像（少数方向なので分解能は粗い）':'';
 }
 function setState(s){state=Math.max(0,Math.min(NSTATE-1,s));update();}
 window.setState=setState;

 window.addEventListener('keydown',function(e){
   var k=e.key;
   if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='Enter'){e.preventDefault();setState(state+1);}
   else if(k==='ArrowLeft'||k==='ArrowUp'){e.preventDefault();setState(state-1);}
   else if(k==='r'||k==='R'){e.preventDefault();setState(0);}
 });

 var m=(location.search||'').match(/[?&]s=(\d+)/);
 setState(m?parseInt(m[1],10):0);
})();
]]></script>
