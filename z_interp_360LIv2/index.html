<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>z 補間② — 360°LI（360°リニア補間）ステッパー</title>
<style>
 html,body{margin:0;padding:0;background:#eef2ee;
   font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .wrap{max-width:1180px;margin:0 auto;padding:14px 16px 24px;}
 .hint{font-size:13.5px;color:#3b4a40;text-align:center;margin:4px 0 10px;}
 .hint b{color:#1b6b34;}
 .stage{background:#f5f8f5;border:1px solid #d6e0d6;border-radius:14px;
   box-shadow:0 6px 22px rgba(30,60,40,.10);overflow:hidden;}
 .stage svg{width:100%;height:auto;display:block;}
</style>
</head>
<body>
<div class="wrap">
 <div class="hint">ヘリカル斜線データから、再構成面 <b>z<sub>R</sub></b> 上の各方向データを <b>線形補間</b> で復元します（<b>←→ / Space / Enter</b>、上部ボタンで直接ジャンプ、<b>r</b>でリセット）。</div>
 <div class="stage">
<svg xmlns="http://www.w3.org/2000/svg" id="ctroot" viewBox="0 0 1280 720" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" font-family="sans-serif">
<style>
 text{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;}
 .btn{cursor:pointer;}
 .btn:hover{opacity:.85;}
 #ctroot{-webkit-user-select:none;user-select:none;}
</style>
<defs>
 <marker id="ahA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#343a40"/></marker>
 <marker id="ahT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5c6b62"/></marker>
 <marker id="ahO" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#f08c00"/></marker>
 <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#d6dbe1"/><stop offset="1" stop-color="#69727e"/>
 </linearGradient>
</defs>
<script type="text/javascript"><![CDATA[
(function(){
 var NS="http://www.w3.org/2000/svg";
 var svg=document.getElementById('ctroot');
 function mk(t,a,p){var e=document.createElementNS(NS,t);if(a)for(var k in a)e.setAttribute(k,a[k]);if(p)p.appendChild(e);return e;}
 function tx(a,s,p){var e=mk('text',a,p);e.textContent=s;return e;}
 function clr(g){while(g.firstChild)g.removeChild(g.firstChild);}

 var DEG=Math.PI/180;
 var GREEN='#2f9e44',GD='#1b6b34',GL='#a9e8b5',YEL='#ffd000',AMB='#f08c00',ADK='#a55500',RED='#e03131',
     INK='#1d2b22',MUT='#5c6b62',DGRY='#343a40';

 // ---------- background / title ----------
 mk('rect',{x:0,y:0,width:1280,height:720,fill:'#f5f8f5'},svg);
 tx({x:30,y:36,'font-size':23,'font-weight':700,fill:INK},'CT 画像再構成：z 補間② — 360°LI（360°リニア補間）',svg);
 tx({x:30,y:60,'font-size':14,fill:MUT},'ヘリカル斜線データを線形補間して、再構成面 z_R 上に β=360〜720° の 1 回転分投影セットを作る — 同じ視野角は β と β+360° の 2 標本',svg);

 // ---------- panels ----------
 function panel(x,w,title,sub,accent){
   mk('rect',{x:x,y:84,width:w,height:482,rx:14,fill:'#ffffff',stroke:accent,'stroke-width':2.2},svg);
   mk('rect',{x:x,y:84,width:6,height:482,rx:3,fill:accent},svg);
   tx({x:x+22,y:116,'font-size':19,'font-weight':700,fill:accent},title,svg);
   tx({x:x+22,y:137,'font-size':12.5,fill:MUT},sub,svg);
   mk('line',{x1:x+20,y1:146,x2:x+w-20,y2:146,stroke:accent,'stroke-width':1,opacity:.5},svg);
 }
 panel(20,608,'1. 装置のうごき（物理ビュー）','同じ視野角 α の 2 標本は z 方向に 1 ピッチだけ離れている',GREEN);
 panel(648,612,'2. 展開図 — 補間で z_R 上を埋める','橙=補間元データ／緑点・線=作成した 360〜720° 投影データ',AMB);

 // ---------- left-panel geometry ----------
 var PYc=362, RX=30, RY=120;
 function zX(z){return 120+(z/3)*420;}
 function pointAt(z,phd){var ph=phd*DEG;return [zX(z)+RX*Math.sin(ph), PYc-RY*Math.cos(ph)];}

 var gPhysBack=mk('g',{},svg), gPhysBody=mk('g',{},svg), gPhysFront=mk('g',{},svg),
     gPhysRing=mk('g',{},svg), gPhysInterp=mk('g',{},svg), gPhysLbl=mk('g',{},svg);

 function emitHelix(t0,t1){
   var A=pointAt(t0/360,t0), B=pointAt(t1/360,t1);
   var front=Math.sin(((t0+t1)/2)*DEG)>=0;
   mk('line',{x1:A[0].toFixed(1),y1:A[1].toFixed(1),x2:B[0].toFixed(1),y2:B[1].toFixed(1),
     stroke:GREEN,'stroke-width':front?3.0:2.3,'stroke-opacity':front?0.78:0.26,'stroke-linecap':'round'},
     front?gPhysFront:gPhysBack);
 }

 function drawPhys(p){
   clr(gPhysBack);clr(gPhysBody);clr(gPhysFront);clr(gPhysRing);clr(gPhysInterp);clr(gPhysLbl);
   // bore axis + couch + body
   mk('line',{x1:78,y1:PYc,x2:596,y2:PYc,stroke:'#c5ccd4','stroke-width':1.5,'stroke-dasharray':'6 6'},gPhysBody);
   mk('rect',{x:88,y:PYc+34,width:504,height:18,rx:9,fill:'#2b3340'},gPhysBody);
   mk('rect',{x:100,y:PYc+28,width:480,height:10,rx:5,fill:'#495a73'},gPhysBody);
   mk('rect',{x:104,y:PYc-20,width:446,height:40,rx:20,fill:'#dbe5f3',stroke:'#9bb0d0','stroke-width':1.5},gPhysBody);
   tx({x:120,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad'},'頭側',gPhysBody);
   tx({x:556,y:PYc-28,'font-size':11.5,'font-weight':700,fill:'#6f86ad','text-anchor':'end'},'足側',gPhysBody);

   // full helical trace (input — already acquired in step ①)
   for(var t=0;t<1080;t+=6) emitHelix(t,t+6);

   // z_R cross-section vertical indicator
   var zRx = zX(1.5);
   mk('line',{x1:zRx, y1:PYc-RY-26, x2:zRx, y2:PYc+RY+10, stroke:RED, 'stroke-width':1.8, 'stroke-dasharray':'5 4', opacity:0.78},gPhysRing);
   tx({x:zRx, y:PYc-RY-32, 'font-size':12.5, 'font-weight':700, fill:RED, 'text-anchor':'middle'},'再構成面 z_R',gPhysRing);

   // faint target slice plane (shown from the first slide onward)
   if(p.showSlicePlane){
     var sliceInset = 1.8; // half of the final ring stroke width, so the fill fits inside it
     mk('ellipse',{cx:zRx, cy:PYc, rx:RX-sliceInset, ry:RY-sliceInset,
       fill:GREEN, opacity:0.12, stroke:GREEN, 'stroke-width':1.1, 'stroke-opacity':0.28},gPhysRing);
   }

   // green ring on z_R (when reconstruction complete)
   if(p.showFullLine){
     mk('ellipse',{cx:zRx, cy:PYc, rx:RX, ry:RY, fill:'none', stroke:GREEN, 'stroke-width':3.6, opacity:0.9},gPhysRing);
     tx({x:zRx, y:PYc+RY+22, 'font-size':12, 'font-weight':700, fill:GD, 'text-anchor':'middle'},'z_R 上に 360〜720°投影セット完成',gPhysRing);
   }

   // current alpha visualization: two source positions + interpolated
   if(p.currentAlpha !== null){
     var ab = alphaToBeta(p.currentAlpha);
     var P1 = pointAt(ab.z1, p.currentAlpha);
     var P2 = pointAt(ab.z2, p.currentAlpha);
     var Pi = pointAt(1.5, p.currentAlpha);
     // dashed line through the three points (same α, varying z)
     mk('line',{x1:P1[0], y1:P1[1], x2:P2[0], y2:P2[1], stroke:AMB, 'stroke-width':1.8, 'stroke-dasharray':'5 4', opacity:0.85},gPhysInterp);
     // source dots (orange)
     mk('circle',{cx:P1[0], cy:P1[1], r:7.5, fill:AMB, stroke:'#fff', 'stroke-width':2},gPhysInterp);
     mk('circle',{cx:P2[0], cy:P2[1], r:7.5, fill:AMB, stroke:'#fff', 'stroke-width':2},gPhysInterp);
     // interpolated dot (green) on z_R
     mk('circle',{cx:Pi[0], cy:Pi[1], r:9, fill:GREEN, stroke:'#fff', 'stroke-width':2.5},gPhysInterp);
     // labels (offset to side of dot)
     var side = (Math.sin(p.currentAlpha*DEG)>=0)? 1 : -1;
     var lo = side*14, anch=(side>0?'start':'end');
     tx({x:P1[0]+lo, y:P1[1]+4, 'font-size':12, 'font-weight':700, fill:ADK, 'text-anchor':anch},'z₁='+ab.z1.toFixed(2),gPhysInterp);
     tx({x:P2[0]+lo, y:P2[1]+4, 'font-size':12, 'font-weight':700, fill:ADK, 'text-anchor':anch},'z₂='+ab.z2.toFixed(2),gPhysInterp);
     tx({x:Pi[0]+lo, y:Pi[1]+4, 'font-size':12.5, 'font-weight':700, fill:GD, 'text-anchor':anch},'補間値',gPhysInterp);
     // α indicator near bottom
     tx({x:zRx, y:PYc+RY+44, 'font-size':12.5, 'font-weight':700, fill:DGRY, 'text-anchor':'middle'},'視野角 α = '+p.currentAlpha+'°',gPhysInterp);
   }

   // z axis
   var zaxY=PYc+170;
   mk('line',{x1:zX(0),y1:zaxY,x2:zX(3)+22,y2:zaxY,stroke:MUT,'stroke-width':1.4,'marker-end':'url(#ahT)'},gPhysLbl);
   [0,1,2,3].forEach(function(z){mk('line',{x1:zX(z),y1:zaxY-4,x2:zX(z),y2:zaxY+4,stroke:MUT,'stroke-width':1.2},gPhysLbl);
     tx({x:zX(z),y:zaxY+18,'font-size':12,fill:MUT,'text-anchor':'middle'},z,gPhysLbl);});
   tx({x:zX(3)+30,y:zaxY+4,'font-size':12.5,fill:MUT},'z',gPhysLbl);
   mk('line',{x1:zRx, y1:zaxY-5, x2:zRx, y2:zaxY+5, stroke:RED, 'stroke-width':1.8},gPhysLbl);
   tx({x:zRx, y:zaxY+34, 'font-size':12, 'font-weight':700, fill:RED, 'text-anchor':'middle'},'z_R = 1.5',gPhysLbl);
 }

 // alpha (0..360) -> beta1, beta2, z1, z2, t
 function alphaToBeta(alpha){
   var k = Math.floor(1.5 - alpha/360);     // pick lower pair such that z1 ≤ z_R ≤ z2
   var b1 = alpha + 360*k;
   var z1 = b1/360, b2 = b1+360, z2 = z1+1;
   var t = (1.5 - z1) / (z2 - z1);          // weight of upper sample
   return {b1:b1, z1:z1, b2:b2, z2:z2, t:t};
 }

 // alpha -> display beta in the completed z_R projection set (360..720).
 function projectionBetaForAlpha(alpha){
   return 360 + (alpha % 360);
 }

 // ---------- right-panel geometry ----------
 var bx0=722,bx1=1206,by0=498,by1=212;
 function Xb(b){return bx0+(b/1080)*(bx1-bx0);}
 function Yb(z){return by0-(z/3)*(by0-by1);}
 var gDiagGrid=mk('g',{},svg), gDiagHelix=mk('g',{},svg), gDiagInterp=mk('g',{},svg),
     gDiagDots=mk('g',{},svg), gDiagLbl=mk('g',{},svg);

 function legend(){
   var items=[
     {color:GREEN,label:'ヘリカル取得データ',dash:'none',x:726,y:176},
     {color:AMB,label:'橙：補間に使う元データ',dash:'5 4',x:902,y:176},
     {color:GREEN,label:'緑：作成された z_R 投影データ',dash:'none',x:726,y:198},
     {color:RED,label:'赤破線：再構成面 z_R',dash:'7 4',x:1002,y:198}
   ];
   items.forEach(function(it){
     mk('line',{x1:it.x,y1:it.y,x2:it.x+26,y2:it.y,stroke:it.color,'stroke-width':3.4,'stroke-dasharray':it.dash,'stroke-linecap':'round'},gDiagLbl);
     tx({x:it.x+32,y:it.y+4,'font-size':11.2,fill:INK},it.label,gDiagLbl);
   });
 }

 function drawDiag(p){
   clr(gDiagGrid);clr(gDiagHelix);clr(gDiagInterp);clr(gDiagDots);clr(gDiagLbl);
   // grid + axes
   [360,720,1080].forEach(function(b){mk('line',{x1:Xb(b),y1:by1,x2:Xb(b),y2:by0,stroke:'#e3e8e3','stroke-width':1},gDiagGrid);});
   mk('line',{x1:bx0,y1:by0,x2:bx0,y2:by1-10,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   mk('line',{x1:bx0,y1:by0,x2:bx1+14,y2:by0,stroke:DGRY,'stroke-width':1.6,'marker-end':'url(#ahA)'},gDiagGrid);
   [0,1,2,3].forEach(function(z){mk('line',{x1:bx0-6,y1:Yb(z),x2:bx0,y2:Yb(z),stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:bx0-12,y:Yb(z)+4,'font-size':12,fill:MUT,'text-anchor':'end'},z,gDiagLbl);});
   [[360,'360°'],[720,'720°'],[1080,'1080°']].forEach(function(d){mk('line',{x1:Xb(d[0]),y1:by0,x2:Xb(d[0]),y2:by0+6,stroke:MUT,'stroke-width':1.2},gDiagLbl);
     tx({x:Xb(d[0]),y:by0+22,'font-size':12,fill:MUT,'text-anchor':'middle'},d[1],gDiagLbl);});
   tx({x:(bx0+bx1)/2,y:by0+44,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle'},'回転角 β（展開）→',gDiagLbl);
   tx({x:bx0-32,y:(by0+by1)/2,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'middle','transform':'rotate(-90 '+(bx0-32)+' '+((by0+by1)/2)+')'},'z（体軸位置）',gDiagLbl);
   legend();

   // helical diagonal (dim — already acquired)
   mk('line',{x1:Xb(0),y1:Yb(0),x2:Xb(1080),y2:Yb(3),stroke:GREEN,'stroke-width':3,'stroke-linecap':'round',opacity:0.45},gDiagHelix);

   // z_R red dashed
   mk('line',{x1:bx0,y1:Yb(1.5),x2:bx1,y2:Yb(1.5),stroke:RED,'stroke-width':2,'stroke-dasharray':'7 4'},gDiagHelix);
   tx({x:bx1-4,y:Yb(1.5)-8,'font-size':12.5,'font-weight':700,fill:RED,'text-anchor':'end'},'再構成面 z_R = 1.5',gDiagHelix);
   // helical/z_R crossing (always shown)
   mk('circle',{cx:Xb(540), cy:Yb(1.5), r:5, fill:RED, stroke:'#fff', 'stroke-width':1.6},gDiagHelix);

   // extent band (state 7+)
   if(p.showExtent){
     mk('line',{x1:Xb(180),y1:Yb(0.5),x2:Xb(900),y2:Yb(2.5),stroke:AMB,'stroke-width':9,'stroke-linecap':'round',opacity:0.16},gDiagInterp);
     mk('line',{x1:bx0,y1:Yb(1.0),x2:bx1,y2:Yb(1.0),stroke:AMB,'stroke-width':1,'stroke-dasharray':'2 3',opacity:0.45},gDiagInterp);
     mk('line',{x1:bx0,y1:Yb(2.0),x2:bx1,y2:Yb(2.0),stroke:AMB,'stroke-width':1,'stroke-dasharray':'2 3',opacity:0.45},gDiagInterp);
     tx({x:Xb(180)-4, y:Yb(0.5)-6, 'font-size':11.5, 'font-weight':700, fill:ADK, 'text-anchor':'end'},'元データ z_R − 0.5',gDiagInterp);
     tx({x:Xb(900)+4, y:Yb(2.5)+14, 'font-size':11.5, 'font-weight':700, fill:ADK, 'text-anchor':'start'},'元データ z_R + 0.5',gDiagInterp);
     tx({x:Xb(540), y:Yb(2.78), 'font-size':12.5, 'font-weight':700, fill:ADK, 'text-anchor':'middle'},'補間に使う元データ範囲 ＝ z_R ± 0.5 ピッチ（1 ピッチ分）',gDiagInterp);
   }

   // concept overlay (state 1)
   if(p.showConcept){
     var ab = alphaToBeta(0);
     mk('path',{d:'M '+Xb(ab.b1)+' '+(Yb(ab.z1)-12)+' Q '+Xb((ab.b1+ab.b2)/2)+' '+(Yb(ab.z1)-58)+' '+Xb(ab.b2)+' '+(Yb(ab.z2)-12),
       fill:'none', stroke:ADK, 'stroke-width':2, 'marker-end':'url(#ahO)'},gDiagInterp);
     tx({x:Xb((ab.b1+ab.b2)/2), y:Yb(ab.z1)-46, 'font-size':12.5, 'font-weight':700, fill:ADK, 'text-anchor':'middle'},'+360° ＝ 同じ視野角 α',gDiagInterp);
     // formula
     tx({x:(bx0+bx1)/2, y:by1+14, 'font-size':12.5, 'font-weight':700, fill:GD, 'text-anchor':'middle'},
       'f(α, z_R) ＝ (1 − t) · f(β, z₁) ＋ t · f(β+360°, z₂),    t ＝ (z_R − z₁) / (z₂ − z₁)',gDiagInterp);
   }

   // current alpha highlight (sweep states)
   if(p.currentAlpha !== null && !p.showFullLine){
     var ab2 = alphaToBeta(p.currentAlpha);
     var outB = projectionBetaForAlpha(p.currentAlpha);
     // source dots on diagonal
     mk('circle',{cx:Xb(ab2.b1), cy:Yb(ab2.z1), r:6.5, fill:AMB, stroke:'#fff', 'stroke-width':1.8},gDiagInterp);
     mk('circle',{cx:Xb(ab2.b2), cy:Yb(ab2.z2), r:6.5, fill:AMB, stroke:'#fff', 'stroke-width':1.8},gDiagInterp);
     // vertical dashed drops: β1 to z_R, β2 to z_R
     mk('line',{x1:Xb(ab2.b1), y1:Yb(ab2.z1), x2:Xb(ab2.b1), y2:Yb(1.5), stroke:AMB, 'stroke-width':1.8, 'stroke-dasharray':'4 3', opacity:0.9},gDiagInterp);
     mk('line',{x1:Xb(ab2.b2), y1:Yb(ab2.z2), x2:Xb(ab2.b2), y2:Yb(1.5), stroke:AMB, 'stroke-width':1.8, 'stroke-dasharray':'4 3', opacity:0.55},gDiagInterp);
     // weight labels (next to vertical drops)
     var midY1 = (Yb(ab2.z1)+Yb(1.5))/2;
     var midY2 = (Yb(ab2.z2)+Yb(1.5))/2;
     if(Math.abs(ab2.z1-1.5)>0.01){
       tx({x:Xb(ab2.b1)-8, y:midY1+4, 'font-size':11.5, 'font-weight':700, fill:ADK, 'text-anchor':'end'},
         '(1−t)＝'+(1-ab2.t).toFixed(2),gDiagInterp);
     }
     if(Math.abs(ab2.z2-1.5)>0.01){
       tx({x:Xb(ab2.b2)+8, y:midY2+4, 'font-size':11.5, 'font-weight':700, fill:ADK, 'text-anchor':'start'},
         't＝'+ab2.t.toFixed(2),gDiagInterp);
     }
     tx({x:Xb(outB), y:Yb(1.5)+20, 'font-size':11.5, 'font-weight':700, fill:GD, 'text-anchor':'middle'},
       '作成値 β='+outB+'°',gDiagDots);
   }

   // accumulated green dots (per sweep state)
   p.alphas.forEach(function(a){
     var outB = projectionBetaForAlpha(a);
     var active = (a===p.currentAlpha && !p.showFullLine);
     mk('circle',{cx:Xb(outB), cy:Yb(1.5), r:active?6.8:5, fill:GREEN, stroke:'#fff', 'stroke-width':active?2:1.5},gDiagDots);
   });

   // full green line (fill / extent / sum states): β ∈ [360°, 720°] = 1 周期分
   if(p.showFullLine){
     mk('line',{x1:Xb(360), y1:Yb(1.5), x2:Xb(720), y2:Yb(1.5), stroke:GREEN, 'stroke-width':6, 'stroke-linecap':'round'},gDiagDots);
     [0,90,180,270].forEach(function(a){
       mk('circle',{cx:Xb(projectionBetaForAlpha(a)), cy:Yb(1.5), r:4.5, fill:GREEN, stroke:'#fff', 'stroke-width':1.4},gDiagDots);
     });
     tx({x:Xb(540), y:Yb(1.5)-12, 'font-size':12.5, 'font-weight':700, fill:GD, 'text-anchor':'middle'},
       'z_R 上に 360〜720°の 1 回転分投影セット完成',gDiagDots);
     tx({x:Xb(720), y:Yb(1.5)+22, 'font-size':11.2, fill:MUT, 'text-anchor':'end'},
       '720°は360°と同じ投影方向なので点は省略',gDiagDots);
   }

   if(p.showSummary){
     tx({x:(bx0+bx1)/2,y:by1+2,'font-size':13.5,'font-weight':700,fill:GD,'text-anchor':'middle'},
       '360°LI ＝ z_R ± 0.5 ピッチの 2 標本で線形補間 → 作成値を β=360〜720° に並べる',gDiagLbl);
   }
 }

 // ---------- state model ----------
 var STATES=[
   {k:'intro'},                  // 0
   {k:'concept'},                // 1
   {k:'sweep', alpha:0},         // 2
   {k:'sweep', alpha:90},        // 3
   {k:'sweep', alpha:180},       // 4
   {k:'sweep', alpha:270},       // 5
   {k:'fill'},                   // 6
   {k:'extent'},                 // 7
   {k:'sum'}                     // 8
 ];

 function params(idx){
   var st = STATES[idx];
   var p = { k: st.k, alphas: [], currentAlpha: null,
     showConcept:false, showSlicePlane:true, showFullLine:false, showExtent:false, showSummary:false,
     color:'green', msg:'' };
   if(st.k==='intro'){
     p.msg = 'ヘリカル斜線データ（緑）と再構成面 z_R（赤破線）。z_R 上は 1 点（赤）しか乗っていない — 残りは z 補間で作ります。';
   } else if(st.k==='concept'){
     p.showConcept = true;
     p.currentAlpha = 0;
     p.alphas.push(0);
     p.msg = '同じ視野角 α は β と β+360° の 2 標本にある（橙弧）。両者を z 方向に線形補間 → z_R 上の値（緑）を作る、が 360°LI の正体。';
   } else if(st.k==='sweep'){
     var order = [0,90,180,270];
     var i = order.indexOf(st.alpha);
     for(var kk=0; kk<=i; kk++) p.alphas.push(order[kk]);
     p.currentAlpha = st.alpha;
     var ab = alphaToBeta(st.alpha);
     var outB = projectionBetaForAlpha(st.alpha);
     if(st.alpha===0)
       p.msg = 'α = 0°：補間元は β='+ab.b1+'° (z₁='+ab.z1.toFixed(2)+') と β='+ab.b2+'° (z₂='+ab.z2.toFixed(2)+')、t='+ab.t.toFixed(2)+' → 作成値は z_R 上の β='+outB+'° に配置。';
     else if(st.alpha===90)
       p.msg = 'α = 90°：補間元は β='+ab.b1+'° (z₁='+ab.z1.toFixed(2)+') と β='+ab.b2+'° (z₂='+ab.z2.toFixed(2)+')、t='+ab.t.toFixed(2)+' → 作成値は β='+outB+'° に配置。';
     else if(st.alpha===180)
       p.msg = 'α = 180°：補間元 β='+ab.b1+'° は z₁='+ab.z1.toFixed(2)+' ＝ z_R（斜線が z_R と交わる点）、t='+ab.t.toFixed(2)+' → 作成値は β='+outB+'° にそのまま配置。';
     else if(st.alpha===270)
       p.msg = 'α = 270°：補間元は β='+ab.b1+'° (z₁='+ab.z1.toFixed(2)+') と β='+ab.b2+'° (z₂='+ab.z2.toFixed(2)+')、t='+ab.t.toFixed(2)+'。作成値は 360〜720° 投影セット側の β='+outB+'° に配置。';
   } else if(st.k==='fill'){
     p.showFullLine = true;
     p.msg = '同じ補間を全 α（0°〜360°）で繰り返し、作成値を z_R 上の β=360〜720° に並べる。720°は360°と同じ方向なので点は重複扱い。';
   } else if(st.k==='extent'){
     p.showFullLine = true; p.showExtent = true;
     p.msg = '橙の帯・点は補間に使う元データの範囲（z_R ± 0.5 ピッチ）。緑線は作成済みの β=360〜720° 投影セット。';
   } else if(st.k==='sum'){
     p.showFullLine = true; p.showExtent = true; p.showSummary = true;
     p.msg = '360°LI まとめ：補間元の 2 点と、完成投影セットとして表示する β=360〜720° の位置を分けて考える。次回 180°LI は対向ビューを使います。';
   }
   return p;
 }

 // ---------- control strip ----------
 mk('line',{x1:20,y1:582,x2:1260,y2:582,stroke:'#dde3dd','stroke-width':1},svg);
 var readout=tx({x:640,y:606,'font-size':15,'font-weight':700,fill:GD,'text-anchor':'middle'},'',svg);

 var NS_=STATES.length-1;
 var jumps=[['イントロ',0],['概念',1],['α 一巡',5],['z_R 完成',6],['総括',NS_]];
 var jbtn=[];
 jumps.forEach(function(j,i){var bx=232+i*128;
   var g=mk('g',{'class':'btn'},svg);
   var r=mk('rect',{x:bx,y:620,width:118,height:30,rx:8,fill:'#fff',stroke:GL,'stroke-width':1.5},g);
   var t=tx({x:bx+59,y:640,'font-size':13,'font-weight':700,fill:GREEN,'text-anchor':'middle'},j[0],g);
   (function(v){g.addEventListener('click',function(){setState(v);});})(j[1]);
   jbtn.push({r:r,t:t,v:j[1]});
 });

 function ctlBtn(x,w,label,fill,stroke,fg){
   var g=mk('g',{'class':'btn'},svg);
   mk('rect',{x:x,y:662,width:w,height:42,rx:10,fill:fill,stroke:stroke,'stroke-width':2},g);
   tx({x:x+w/2,y:689,'font-size':16,'font-weight':700,fill:fg,'text-anchor':'middle'},label,g);
   return g;
 }
 var bPrev=ctlBtn(402,150,'◀ 戻る','#ffffff',GREEN,GREEN);
 var bNext=ctlBtn(566,150,'進む ▶',GREEN,GD,'#ffffff');
 var bReset=ctlBtn(730,120,'リセット','#ffffff',RED,RED);
 bPrev.addEventListener('click',function(){setState(state-1);});
 bNext.addEventListener('click',function(){setState(state+1);});
 bReset.addEventListener('click',function(){setState(0);});
 var stepTxt=tx({x:1180,y:643,'font-size':13,'font-weight':700,fill:MUT,'text-anchor':'end'},'',svg);
 tx({x:640,y:715,'font-size':12.5,fill:MUT,'text-anchor':'middle'},'クリック ／ ←→・Space・Enter で前後 ／ 上のボタンで直接ジャンプ ／ r でリセット',svg);

 // ---------- driver ----------
 var state=0;
 function update(){
   var p=params(state);
   drawPhys(p); drawDiag(p);
   readout.textContent=p.msg;
   stepTxt.textContent=(state+1)+' / '+(NS_+1);
   for(var i=0;i<jbtn.length;i++){var b=jbtn[i];
     if(b.v===state){b.r.setAttribute('fill',YEL);b.r.setAttribute('stroke',AMB);b.t.setAttribute('fill',INK);}
     else{b.r.setAttribute('fill','#fff');b.r.setAttribute('stroke',GL);b.t.setAttribute('fill',GREEN);}
   }
 }
 function setState(s){state=Math.max(0,Math.min(NS_,s));update();}
 window.addEventListener('keydown',function(e){
   var k=e.key;
   if(k==='ArrowRight'||k==='ArrowDown'||k===' '||k==='Enter'){e.preventDefault();setState(state+1);}
   else if(k==='ArrowLeft'||k==='ArrowUp'){e.preventDefault();setState(state-1);}
   else if(k==='r'||k==='R'){e.preventDefault();setState(0);}
 });
 setState(0);
})();
]]></script>
</svg>
